<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>promman – Groq prototype</title>
  <style>
    * {
      caret-color: transparent;
    }
    input,
    textarea {
      caret-color: #e5e7eb;
    }
    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020617;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    header {
      padding: 20px 16px 16px;
      background: #000000;
      border-bottom: 1px solid #111827;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .logo-image {
      width: 360px;
      max-width: 95vw;
      border-radius: 0;
      overflow: hidden;
    }
    .logo-image img {
      display: block;
      width: 100%;
      height: auto;
    }
    header h1 {
      display: none;
    }
    header span.sub { display: none; }
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      min-height: 0;
      overflow: hidden;
    }
    .column {
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-left: 1px solid #111827;
    }
    .column:first-child { border-left: none; }
    .column:nth-child(2) {
      overflow-y: auto;
      min-height: 0;
    }
    .director-controls-inner {
      width: 100%;
      min-width: 0;
    }

    .section-header {
      padding: 8px 12px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ca3af;
      border-bottom: 1px solid #111827;
      background: #000000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .section-header span.sub2 {
      font-size: 11px;
      text-transform: none;
      letter-spacing: 0;
      color: #6b7280;
    }

    textarea {
      border: none;
      resize: none;
      padding: 12px;
      background: #020617;
      color: #e5e7eb;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
      line-height: 1.5;
      outline: none;
      border-radius: 0;
      width: 100%;
      box-sizing: border-box;
    }

    .ko-input-wrapper {
      padding: 10px 12px;
      border-bottom: 1px solid #111827;
    }
    .ko-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .ko-row textarea {
      flex: 1;
      min-height: 80px;
      max-height: 150px;
    }

    .btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 999px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
    }
    .btn:hover { background: #2563eb; }
    .btn.secondary {
      background: #111827;
      color: #e5e7eb;
      border: 1px solid #374151;
    }
    .btn.secondary:hover { background: #1f2937; }

    .status {
      font-size: 11px;
      color: #9ca3af;
      padding: 4px 12px 0;
    }
    .status.error { color: #f97373; }

    .output {
      flex: 1;
      min-height: 0;
      padding: 12px;
      background: #020617;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      overflow: auto;
    }

    .footer {
      padding: 8px 12px;
      border-top: 1px solid #1f2937;
      background: #000000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .right-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      user-select: none;
    }

    .pill-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }
    .pill-button {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid #374151;
      background: #020617;
      color: #9ca3af;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }
    .pill-button:hover {
      background: #111827;
      color: #e5e7eb;
    }
    .pill-button.active {
      background: #3b82f6;
      border-color: #3b82f6;
      color: #ffffff;
    }
    .shot-thumb-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 4px;
      width: 100%;
      min-width: 0;
    }
    .shot-thumb {
      background: #020617;
      border-radius: 10px;
      border: 1px solid #1f2937;
      padding: 4px;
      width: 100%;
      min-width: 0;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
    }
    .shot-thumb img {
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      border-radius: 8px;
      display: block;
    }
    .shot-thumb span {
      margin-top: 4px;
      font-size: 11px;
      color: #d1d5db;
    }
    .shot-thumb.active {
      border-color: #3b82f6;
      box-shadow: 0 0 0 1px rgba(59,130,246,0.6);
      transform: translateY(-1px);
    }
    .select {
      background: #020617;
      color: #e5e7eb;
      border-radius: 999px;
      border: 1px solid #374151;
      padding: 5px 10px;
      font-size: 11px;
    }
    .badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 999px;
      background: #000000;
      border: 1px solid #374151;
      color: #9ca3af;
    }
    .persona-item {
      display: inline-flex;
      align-items: center;
      gap: 0;
      border-radius: 999px;
      background: #020617;
      border: 1px solid #374151;
      overflow: hidden;
    }
    .persona-remove {
      width: 18px;
      height: 18px;
      padding: 0;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: #6b7280;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .persona-remove:hover {
      background: #111827;
      color: #f97373;
    }

  </style>
</head>
<body>

    <div class="logo-image">
      <img src="promman-hero.png" alt="PROMMAN hero image">
    </div>
    <h1><span>prom</span>man</h1>

    <!-- 왼쪽: 한국어 입력 + 결과 프롬프트 -->
    <section class="column">
      <div class="section-header">

        <span class="sub2">영화 스틸 느낌의 영어 프롬프트</span>
      </div>
      <!-- 페르소나 설정 -->
      <div class="ko-input-wrapper" style="border-bottom:none; border-top:1px solid #111827;">
        <div class="status" style="padding-left:0; padding-bottom:4px;">페르소나</div>
        <div id="persona-row" style="display:flex; align-items:center; gap:6px; flex-wrap:wrap;">
          <div class="persona-item">

            <button class="persona-remove" type="button" title="삭제">×</button>

    <!-- 오른쪽: 촬영감독 컨트롤 패널 -->
    <section class="column">
      <div class="section-header">

        <span class="sub2">카메라 · 시간 · 감독 톤</span>
      </div>
      <div class="director-controls-inner" style="padding: 10px 12px; display: flex; flex-direction: column; gap: 12px;">
        <!-- 카메라 화각 -->

  <script>
    // ===== 1) SceneSchema → 프롬프트 빌더 (규칙 기반) =====
    function buildPromptFromScene(scene) {
      const subjects = scene.subjects || [];
      const primary_action = scene.primary_action || {};
      const location = scene.location || {};
      const environment = scene.environment || {};
      const camera = scene.camera || {};
      const lighting = scene.lighting || {};
      const mood = scene.mood || {};
      const styleControl = scene.styleControl || {
        stylePreset: "unspecified",
        allow_stylization: false,
        required_keywords_en: [],
        forbidden_keywords_en: []
      };

      const subjectDescriptions = subjects
        .filter((s) => s.type === "human")
        .map((s) => s.description_en || "a person")
        .join(" and ") || "two people";

      const relationship = scene.relationship || "unspecified";
      const relationshipPhrase =
        relationship === "couple"
          ? "who seem like a couple"
          : relationship === "friends"
          ? "who seem like close friends"
          : relationship === "family"
          ? "who seem like family"
          : "";

      const actionLineParts = [
        primary_action.main_verb_en,
        primary_action.detail_en,
        primary_action.emotional_change_en ? "their mood shifts " + primary_action.emotional_change_en : ""
      ].filter(Boolean);
      const actionLine = actionLineParts.join(", ");

      const locationText =
        location.detail_en ||
        location.name_en ||
        "an urban outdoor location";

      let timeOfDayText = "";
      switch (environment.timeOfDay) {
        case "night": timeOfDayText = "at night"; break;
        case "golden_hour": timeOfDayText = "during golden hour"; break;
        case "day": timeOfDayText = "during the day"; break;
        case "dawn": timeOfDayText = "at dawn"; break;
        case "dusk": timeOfDayText = "at dusk"; break;
        default: timeOfDayText = "";
      }

      let weatherText = "";
      switch (environment.weather) {
        case "clear": weatherText = "clear weather"; break;
        case "rainy": weatherText = "in the rain"; break;
        case "snowy": weatherText = "in the snow"; break;
        case "foggy": weatherText = "foggy"; break;
        case "overcast": weatherText = "overcast"; break;
        default: weatherText = "";
      }

      const atmosphereText = environment.atmosphere_en || "";
      let colorGradingText = "naturalistic color grading";
      switch (environment.colorGrading) {
        case "warm":
          colorGradingText = "warm color grading with natural skin tones"; break;
        case "teal_orange":
          colorGradingText = "subtle teal and orange color grading"; break;
        case "monochrome":
          colorGradingText = "soft monochrome grading"; break;
        case "vibrant":
          colorGradingText = "vibrant but cinematic color grading"; break;
        case "muted":
          colorGradingText = "muted, understated color grading"; break;
      }

      const shotTextMap = {
        extreme_close_up: "an extreme close-up shot",
        close_up: "a close-up shot",
        medium: "a medium two-shot",
        medium_wide: "a medium wide shot",
        wide: "a wide shot",
        long: "a long shot"
      };
      const angleTextMap = {
        eye_level: "from eye level",
        low_angle: "from a low angle looking up",
        high_angle: "from a high angle looking down",
        birds_eye_view: "from a bird's eye view directly above",
        worms_eye_view: "from a worm's eye view looking up from below",
        dutch_angle: "with a Dutch (canted) angle",
        over_the_shoulder: "over the shoulder",
        point_of_view: "from a point-of-view (POV) perspective",
        top_down: "from directly above",
        unspecified: ""
      };
      const movementTextMap = {
        static: "from a static camera",
        pan: "with a gentle pan",
        tilt: "with a slow tilt",
        dolly_in: "with a slow dolly in toward them",
        dolly_out: "with a slow dolly out",
        truck: "with a subtle sideways truck move",
        arc: "with a slow arcing movement around them",
        crane: "with a slow crane movement",
        handheld: "with a slightly handheld, natural feel",
        unspecified: ""
      };

      const shotText = shotTextMap[camera.shot] || "a medium shot";
      const angleText = angleTextMap[camera.angle] || angleTextMap.unspecified;
      const movementText = movementTextMap[camera.movement || "unspecified"] || "";
      const depthText = camera.depthOfField_en || "natural depth of field";

      let lightingDescription = lighting.description_en;
      if (!lightingDescription) {
        switch (lighting.style) {
          case "natural":
            lightingDescription = "natural, soft lighting"; break;
          case "low_key":
            lightingDescription = "low key lighting with strong contrast and deep shadows"; break;
          case "high_key":
            lightingDescription = "bright, high key lighting with soft shadows"; break;
          case "golden_hour":
            lightingDescription = "warm golden hour light"; break;
          case "volumetric":
            lightingDescription = "dramatic volumetric lighting with visible light beams"; break;
          default:
            lightingDescription = "cinematic lighting";
        }
      }

      const requiredKeywords = (styleControl.required_keywords_en || []).join(", ");
      const forbiddenKeywords = (styleControl.forbidden_keywords_en || []).join(", ");

      let stylePresetText;
      switch (styleControl.stylePreset) {
        case "korean_urban_romance_film":
          stylePresetText = "A cinematic still frame from a modern Korean urban romance film, shot on 35mm."; break;
        case "korean_indie_drama":
          stylePresetText = "A quiet, cinematic still from a Korean indie drama."; break;
        case "hollywood_blockbuster":
          stylePresetText = "A cinematic still from a Hollywood film."; break;
        case "documentary":
          stylePresetText = "A realistic still from a documentary film."; break;
        default:
          stylePresetText = "A cinematic film still.";
      }

      const moodText = mood && mood.tone_en ? mood.tone_en : "";

      const lines = [];
      lines.push(stylePresetText);
      if (scene.personas && Array.isArray(scene.personas) && scene.personas.length) {
        lines.push("Characters: " + scene.personas.join(", ") + ".");
      }
      lines.push("");
      const anglePhrase = angleText ? " " + angleText : "";
      lines.push(
        shotText +
          anglePhrase +
          " of " +
          subjectDescriptions +
          (relationshipPhrase ? ", " + relationshipPhrase : "") +
          ", at " +
          locationText +
          (timeOfDayText ? " " + timeOfDayText : "") +
          (weatherText ? ", " + weatherText : "") +
          "."
      );
      if (actionLine) lines.push(actionLine + ".");
      lines.push(
        lightingDescription +
          ", " +
          depthText +
          (atmosphereText ? ", " + atmosphereText : "") +
          ", " +
          colorGradingText +
          "."
      );
      if (moodText) lines.push(moodText + ".");
      if (requiredKeywords) lines.push(requiredKeywords + ".");
      if (forbiddenKeywords) lines.push(forbiddenKeywords + ".");
      return lines.join("\n");
    }

    // ===== 2) Groq: 한국어 → SceneSchema JSON (백엔드 /api/scene 경유) =====
    async function koreanToSceneSchemaGroq(koreanText) {
      const res = await fetch("/api/scene", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ koreanText })
      });

      if (!res.ok) {
        const txt = await res.text();
        throw new Error("Backend error: " + txt);
      }

      const scene = await res.json();
      return scene;
    }

    // ===== 3) UI 연결 =====
    const koInput = document.getElementById("ko-input");
    const generateBtn = document.getElementById("generate-btn");
    const promptOutput = document.getElementById("prompt-output");
    const statusRight = document.getElementById("status-right");
    const copyBtn = document.getElementById("copy-btn");
    const shotGroup = document.getElementById("shot-group");
    const angleGroup = document.getElementById("angle-group");
    const timeGroup = document.getElementById("time-group");
    const weatherGroup = document.getElementById("weather-group");
    const directorGroup = document.getElementById("director-group");
    const personaRow = document.getElementById("persona-row");
    const personaAddBtn = document.getElementById("persona-add");

    let shotOverride = "";
    let angleOverride = "";
    let timeOverride = "";
    let weatherOverride = "";
    let directorOverride = "none";

    function setStatusRight(text, isError) {
      setStatus(statusRight, text, isError);
    }

    function setStatus(el, text, isError) {
      el.textContent = text;
      if (isError) el.classList.add("error");
      else el.classList.remove("error");
    }

    function applyDirectorOverrides(scene) {
      const override = directorOverride;
      if (!override || override === "none") return scene;

      scene.styleControl = scene.styleControl || {
        stylePreset: "unspecified",
        allow_stylization: true,
        required_keywords_en: [],
        forbidden_keywords_en: []
      };
      scene.mood = scene.mood || {};

      switch (override) {
        case "park_chan_wook":
          scene.styleControl.stylePreset = "korean_indie_drama";
          scene.mood.tone_en = "dark, tense, meticulously composed like a Park Chan-wook film";
          scene.styleControl.required_keywords_en.push("highly composed framing", "Korean auteur cinema");
          break;
        case "bong_joon_ho":
          scene.styleControl.stylePreset = "korean_urban_romance_film";
          scene.mood.tone_en = "realistic, slightly satirical, with social tension like a Bong Joon-ho film";
          scene.styleControl.required_keywords_en.push("Korean realist cinema", "subtle social commentary");
          break;
        case "greta_gerwig":
          scene.styleControl.stylePreset = "korean_urban_romance_film";
          scene.mood.tone_en = "warm, tender, youth-driven energy like a Greta Gerwig film";
          scene.styleControl.required_keywords_en.push("soft pastel colors", "gentle whimsical tone");
          break;
        case "nolan":
          scene.styleControl.stylePreset = "hollywood_blockbuster";
          scene.mood.tone_en = "epic, serious, high-stakes atmosphere like a Christopher Nolan film";
          scene.styleControl.required_keywords_en.push("strong contrast lighting", "precise, dramatic framing");
          break;
      }

      return scene;
    }

    function applyCameraOverrides(scene) {
      scene.camera = scene.camera || {};
      scene.environment = scene.environment || {};

      if (shotOverride) {
        scene.camera.shot = shotOverride;
      }
      if (angleOverride) {
        scene.camera.angle = angleOverride;
      }
      if (timeOverride) {
        scene.environment.timeOfDay = timeOverride;
      }
      if (weatherOverride) {
        scene.environment.weather = weatherOverride;
      }

      return scene;
    }

    function setupPillGroup(groupEl, onChange, initialValue) {
      if (!groupEl) return;
      const buttons = Array.from(groupEl.querySelectorAll(".pill-button, .shot-thumb"));
      if (initialValue !== undefined) {
        buttons.forEach((btn) => {
          if ((btn.getAttribute("data-value") || "") === initialValue) {
            btn.classList.add("active");
          } else {
            btn.classList.remove("active");
          }
        });
      }
      groupEl.addEventListener("click", (e) => {
        let target = e.target;
        if (!(target instanceof HTMLElement)) return;
        if (target.closest(".shot-thumb")) {
          target = target.closest(".shot-thumb");
        }
        if (!target.classList.contains("pill-button") && !target.classList.contains("shot-thumb")) return;
        e.preventDefault();
        const val = target.getAttribute("data-value") || "";
        buttons.forEach((btn) => {
          if (btn === target) btn.classList.add("active");
          else btn.classList.remove("active");
        });
        onChange(val);
      });
    }

    setupPillGroup(shotGroup, (val) => { shotOverride = val; }, shotOverride);
    setupPillGroup(angleGroup, (val) => { angleOverride = val; }, angleOverride);
    setupPillGroup(timeGroup, (val) => { timeOverride = val; }, timeOverride);
    setupPillGroup(weatherGroup, (val) => { weatherOverride = val; }, weatherOverride);
    setupPillGroup(directorGroup, (val) => { directorOverride = val || "none"; }, directorOverride);

    function getPersonas() {
      if (!personaRow) return [];
      const inputs = Array.from(personaRow.querySelectorAll(".persona-input"));
      return inputs
        .map((el) => (el.value || "").trim())
        .filter((v) => v.length > 0);
    }

    if (personaAddBtn && personaRow) {
      personaRow.addEventListener("click", (e) => {
        const removeBtn = e.target && e.target.classList && e.target.classList.contains("persona-remove");
        if (removeBtn) {
          e.preventDefault();
          const item = e.target.closest(".persona-item");
          if (item && personaRow.querySelectorAll(".persona-item").length > 1) {
            item.remove();
          }
        }
      });
      personaAddBtn.addEventListener("click", (e) => {
        e.preventDefault();
        const count = personaRow.querySelectorAll(".persona-input").length;
        const label = String.fromCharCode(65 + count);
        const item = document.createElement("div");
        item.className = "persona-item";
        const input = document.createElement("input");
        input.className = "persona-input";
        input.type = "text";
        input.placeholder = "인물 " + label;
        input.style.padding = "4px 8px";
        input.style.border = "none";
        input.style.background = "transparent";
        input.style.color = "#e5e7eb";
        input.style.fontSize = "12px";
        input.style.minWidth = "72px";
        const removeBtn = document.createElement("button");
        removeBtn.className = "persona-remove";
        removeBtn.type = "button";
        removeBtn.title = "삭제";
        removeBtn.textContent = "×";
        item.appendChild(input);
        item.appendChild(removeBtn);
        personaRow.insertBefore(item, personaAddBtn);
        input.focus();
      });
    }

    generateBtn.addEventListener("click", async () => {
      const text = koInput.value.trim();
      if (!text) {
        setStatusRight("한국어 장면 설명을 먼저 입력하세요.", true);
        return;
      }

      promptOutput.textContent = "";
      setStatusRight("Groq로 SceneSchema 생성 중...", false);

      try {
        let scene = await koreanToSceneSchemaGroq(text);
        const personas = getPersonas();
        if (personas.length) {
          scene.personas = personas;
        }
        scene = applyCameraOverrides(scene);
        scene = applyDirectorOverrides(scene);
        const prompt = buildPromptFromScene(scene);
        promptOutput.textContent = prompt;
        setStatusRight("SceneSchema · 프롬프트 생성 완료.", false);
      } catch (e) {
        setStatusRight("SceneSchema 생성 실패: " + e.message, true);
      }
    });

    copyBtn.addEventListener("click", async () => {
      const text = promptOutput.textContent || "";
      if (!text.trim()) return;
      try {
        await navigator.clipboard.writeText(text);
        setStatus(statusRight, "프롬프트를 클립보드에 복사했습니다.", false);
      } catch {
        setStatus(statusRight, "클립보드 복사 실패.", true);
      }
    });
  </script>
</body>
</html>
