<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>promman – Groq prototype</title>
  <style>
    * {
      caret-color: transparent;
    }
    input,
    textarea {
      caret-color: #e5e7eb;
    }
    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020617;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    header {
      padding: 20px 16px 16px;
      background: #000000;
      border-bottom: 1px solid #111827;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .logo-image {
      width: 360px;
      max-width: 95vw;
      border-radius: 0;
      overflow: hidden;
    }
    .logo-image img {
      display: block;
      width: 100%;
      height: auto;
    }
    header h1 {
      display: none;
    }
    header span.sub { display: none; }
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 0.9fr 1.4fr 1fr;
      min-height: 0;
      overflow: hidden;
    }
    .column {
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-left: 1px solid #111827;
    }
    .column:first-child { border-left: none; }
    .column:nth-child(1),
    .column:nth-child(2),
    .column:nth-child(3) {
      min-height: 0;
    }
    .column:nth-child(1),
    .column:nth-child(2) {
      overflow-y: auto;
    }
    .director-controls-inner {
      width: 100%;
      min-width: 0;
    }

    .section-header {
      padding: 8px 12px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ca3af;
      border-bottom: 1px solid #111827;
      background: #000000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .section-header span.sub2 {
      font-size: 11px;
      text-transform: none;
      letter-spacing: 0;
      color: #6b7280;
    }

    textarea {
      border: none;
      resize: none;
      padding: 12px;
      background: #020617;
      color: #e5e7eb;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
      line-height: 1.5;
      outline: none;
      border-radius: 0;
      width: 100%;
      box-sizing: border-box;
    }

    .ko-input-wrapper {
      padding: 10px 12px;
      border-bottom: 1px solid #111827;
    }
    .ko-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .ko-row textarea {
      flex: 1;
      min-height: 80px;
      max-height: 150px;
    }

    .btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 999px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
    }
    .btn:hover { background: #2563eb; }
    .btn.secondary {
      background: #111827;
      color: #e5e7eb;
      border: 1px solid #374151;
    }
    .btn.secondary:hover { background: #1f2937; }

    .status {
      font-size: 11px;
      color: #9ca3af;
      padding: 4px 12px 0;
    }
    .status.error { color: #f97373; }

    .output {
      flex: 1;
      min-height: 0;
      padding: 12px;
      background: #020617;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      overflow: auto;
    }

    .footer {
      padding: 8px 12px;
      border-top: 1px solid #1f2937;
      background: #000000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      position: sticky;
      bottom: 0;
      z-index: 5;
    }
    .right-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      user-select: none;
    }

    .pill-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }
    .pill-button {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid #374151;
      background: #020617;
      color: #9ca3af;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }
    .pill-button:hover {
      background: #111827;
      color: #e5e7eb;
    }
    .pill-button.active {
      background: #3b82f6;
      border-color: #3b82f6;
      color: #ffffff;
    }
    .shot-thumb-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-top: 4px;
      width: 100%;
      min-width: 0;
    }
    .shot-thumb {
      background: #020617;
      border-radius: 8px;
      border: 1px solid #1f2937;
      padding: 3px;
      width: 100%;
      min-width: 0;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
    }
    .shot-thumb img {
      width: 100%;
      height: auto;
      aspect-ratio: 4 / 3;
      max-height: 64px;
      object-fit: cover;
      border-radius: 6px;
      display: block;
    }
    .shot-thumb span {
      margin-top: 3px;
      font-size: 10px;
      color: #d1d5db;
    }
    .shot-thumb.active {
      border-color: #3b82f6;
      box-shadow: 0 0 0 1px rgba(59,130,246,0.6);
      transform: translateY(-1px);
    }
    /* 앵글 그룹: 선택된 썸네일만 보이는 접힘 상태 지원 */
    .shot-thumb-row.collapsed .shot-thumb {
      display: none;
    }
    .shot-thumb-row.collapsed .shot-thumb.active {
      display: flex;
    }
    .select {
      background: #020617;
      color: #e5e7eb;
      border-radius: 999px;
      border: 1px solid #374151;
      padding: 5px 10px;
      font-size: 11px;
    }
    .badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 999px;
      background: #000000;
      border: 1px solid #374151;
      color: #9ca3af;
    }
    .persona-item {
      display: inline-flex;
      align-items: center;
      gap: 0;
      border-radius: 999px;
      background: #020617;
      border: 1px solid #374151;
      overflow: hidden;
    }
    .persona-remove {
      width: 18px;
      height: 18px;
      padding: 0;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: #6b7280;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .persona-remove:hover {
      background: #111827;
      color: #f97373;
    }

    .history-list {
      padding: 10px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .history-item {
      border-radius: 8px;
      border: 1px solid #1f2937;
      background: #020617;
      padding: 8px 10px;
      font-size: 11px;
      color: #d1d5db;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .history-text {
      max-height: 4.5em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: pre-wrap;
    }
    .history-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      color: #6b7280;
    }
    .history-actions {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .history-btn {
      border: none;
      border-radius: 999px;
      padding: 3px 6px;
      font-size: 10px;
      cursor: pointer;
      background: #020617;
      color: #9ca3af;
      border: 1px solid #374151;
    }
    .history-btn:hover {
      background: #111827;
      color: #e5e7eb;
    }
    .history-like.history-liked {
      background: #facc15;
      border-color: #eab308;
      color: #111827;
    }

  </style>
</head>
<body>
  <header>
    <div class="logo-image">
      <img src="promman-hero.png" alt="PROMMAN hero image">
    </div>
    <h1><span>prom</span>man</h1>
    <span class="sub"></span>
  </header>

  <main>
    <!-- 히스토리 컬럼 -->
    <section class="column">
      <div class="section-header">
        <span>Prompt History</span>
        <span class="sub2">즐겨찾기 · 과거 프롬프트</span>
      </div>
      <div id="history-list" class="history-list"></div>
    </section>

    <!-- 가운데: 한국어 입력 + 결과 프롬프트 -->
    <section class="column">
      <div class="section-header">
        <span>Generated Cinematic Prompt</span>
        <span class="sub2">시네마틱 프롬프트 번역기</span>
      </div>
      <!-- 페르소나 설정 -->
      <div class="ko-input-wrapper" style="border-bottom:none; border-top:1px solid #111827;">
        <div class="status" style="padding-left:0; padding-bottom:4px;">페르소나</div>
        <div id="persona-row" style="display:flex; align-items:center; gap:6px; flex-wrap:wrap;">
          <div class="persona-item">
            <input class="persona-input" type="text" placeholder="인물 A" style="padding:4px 8px; border:none; background:transparent; color:#e5e7eb; font-size:12px; min-width:72px;">
            <button class="persona-remove" type="button" title="삭제">×</button>
          </div>
          <button id="persona-add" class="btn secondary" type="button" style="flex-shrink:0; padding:4px 10px; font-size:11px;">+ 사람 추가</button>
        </div>
      </div>
      <div class="ko-input-wrapper">
        <div class="ko-row">
          <textarea id="ko-input" placeholder="여기에 장면을 한국어로 적어보세요.&#10;예) 한국 남녀가 풋풋하게 종로 호프에서 맥주를 마시고 있다"></textarea>
          <button class="btn" id="generate-btn">프롬프트</button>
        </div>
      </div>
      <div id="prompt-output" class="output"></div>
      <div class="footer">
        <span id="status-right" class="status">아직 생성되지 않았습니다.</span>
        <div class="right-controls">
          <select id="model-select" class="select">
            <option value="generic">Generic</option>
            <option value="nanobanana">Nanobanana</option>
            <option value="kling">Kling</option>
          </select>
          <button class="btn secondary" id="copy-btn">프롬프트 복사</button>
        </div>
      </div>
    </section>

    <!-- 오른쪽: 촬영감독 컨트롤 패널 -->
    <section class="column">
      <div class="section-header">
        <span>Director Controls</span>
        <span class="sub2">장르 · 카메라 · 시간</span>
      </div>
      <div class="director-controls-inner" style="padding: 10px 12px; display: flex; flex-direction: column; gap: 10px;">
        <!-- 장르 / 무드 -->
        <div>
          <div class="status" style="padding-left:0;">장르 / 무드</div>
          <div id="genre-group" class="pill-group">
            <button class="pill-button active" data-value="">Auto</button>
            <button class="pill-button" data-value="coming_of_age">Coming-of-age youth drama</button>
            <button class="pill-button" data-value="dreamy_romance">Dreamy romance</button>
            <button class="pill-button" data-value="gritty_noir">Gritty urban noir</button>
            <button class="pill-button" data-value="slice_of_life">Quiet slice-of-life</button>
            <button class="pill-button" data-value="thriller">Tense cinematic thriller</button>
          </div>
        </div>

        <!-- 카메라 화각 -->
        <div>
          <div class="status" style="padding-left:0;">카메라 화각 (Shot) · Recommend는 장면 맥락에 따라 LLM이 자동 선택</div>
          <div id="shot-group" class="shot-thumb-row">
            <button class="shot-thumb" data-value="">
              <img src="shot-recommend.png" alt="Recommend shot thumbnail">
              <span>Recommend</span>
            </button>
            <button class="shot-thumb" data-value="extreme_close_up">
              <img src="shot-extreme-close-up.png" alt="Extreme Close-Up thumbnail">
              <span>Extreme Close-Up</span>
            </button>
            <button class="shot-thumb" data-value="close_up">
              <img src="shot-close-up.png" alt="Close-Up thumbnail">
              <span>Close-Up</span>
            </button>
            <button class="shot-thumb" data-value="medium_close_up">
              <img src="shot-medium-close-up.png" alt="Medium Close-Up thumbnail">
              <span>Medium Close-Up</span>
            </button>
            <button class="shot-thumb" data-value="medium">
              <img src="shot-medium-shot.png" alt="Medium Shot thumbnail">
              <span>Medium Shot</span>
            </button>
            <button class="shot-thumb" data-value="medium_wide">
              <img src="shot-medium-wide-shot.png" alt="Medium Wide Shot thumbnail">
              <span>Medium Wide Shot</span>
            </button>
            <button class="shot-thumb" data-value="wide">
              <img src="shot-wide-shot.png" alt="Wide Shot thumbnail">
              <span>Wide Shot</span>
            </button>
            <button class="shot-thumb" data-value="extreme_wide">
              <img src="shot-extreme-wide-shot.png" alt="Extreme Wide Shot thumbnail">
              <span>Extreme Wide Shot</span>
            </button>
          </div>
        </div>

        <!-- 카메라 앵글 -->
        <div>
          <div class="status" style="padding-left:0;">카메라 앵글 (Angle)</div>
          <div id="angle-group" class="shot-thumb-row collapsed" data-collapsible="single-preview">
            <button class="shot-thumb" data-value="eye_level">
              <img src="angle-eye-level.png" alt="Eye Level thumbnail">
              <span>Eye Level</span>
            </button>
            <button class="shot-thumb" data-value="low_angle">
              <img src="angle-low-angle.png" alt="Low Angle thumbnail">
              <span>Low Angle</span>
            </button>
            <button class="shot-thumb" data-value="high_angle">
              <img src="angle-high-angle.png" alt="High Angle thumbnail">
              <span>High Angle</span>
            </button>
            <button class="shot-thumb" data-value="top_down">
              <img src="angle-birds-eye-view.png" alt="Bird's Eye View thumbnail">
              <span>Bird's Eye View</span>
            </button>
            <button class="shot-thumb" data-value="worms_eye">
              <img src="angle-worms-eye-view.png" alt="Worm's Eye View thumbnail">
              <span>Worm's Eye View</span>
            </button>
            <button class="shot-thumb" data-value="dutch_angle">
              <img src="angle-dutch-angle.png" alt="Dutch Angle thumbnail">
              <span>Dutch / Canted Angle</span>
            </button>
            <button class="shot-thumb" data-value="over_shoulder">
              <img src="angle-over-the-shoulder.png" alt="Over the Shoulder thumbnail">
              <span>Over the Shoulder</span>
            </button>
            <button class="shot-thumb" data-value="pov">
              <img src="angle-point-of-view.png" alt="Point of View thumbnail">

          </div>

        <!-- 시간 (새벽·낮·노을·밤) -->

          <div class="status" style="padding-left:0;">시간</div>
          <div id="time-group" class="shot-thumb-row" style="grid-template-columns: repeat(4, 1fr);">
            <button class="shot-thumb" data-value="dawn">
              <img src="time-dawn.png" alt="새벽 thumbnail">

              <img src="time-day.png" alt="낮 thumbnail">

            </button>
            <button class="shot-thumb" data-value="dusk">
              <img src="time-dusk.png" alt="노을 thumbnail">
              <span>노을</span>
            </button>
            <button class="shot-thumb" data-value="night">
              <img src="time-night.png" alt="밤 thumbnail">
              <span>밤</span>
            </button>
          </div>
        </div>

        <!-- 날씨 -->
        <div>
          <div class="status" style="padding-left:0;">날씨</div>
          <div id="weather-group" class="shot-thumb-row" style="grid-template-columns: repeat(3, 1fr);">
            <button class="shot-thumb" data-value="clear">
              <img src="weather-clear.png" alt="맑음 thumbnail">

            </button>

              <span>눈</span>
            </button>

              <img src="weather-rain.png" alt="비 thumbnail">
              <span>비</span>
            </button>
          </div>

        <!-- 감독 프리셋 -->
        <div>
          <div class="status" style="padding-left:0;">감독 스타일 프리셋</div>
          <div id="director-group" class="pill-group">
            <button class="pill-button active" data-value="none">없음</button>
            <button class="pill-button" data-value="park_chan_wook">박찬욱</button>
            <button class="pill-button" data-value="bong_joon_ho">봉준호</button>
            <button class="pill-button" data-value="greta_gerwig">그레타 거윅</button>
            <button class="pill-button" data-value="nolan">크리스토퍼 놀란</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    // ===== 1) SceneSchema → 프롬프트 빌더 (규칙 기반) =====
    function buildPromptFromScene(scene) {
      const subjects = scene.subjects || [];
      const primary_action = scene.primary_action || {};
      const location = scene.location || {};
      const environment = scene.environment || {};
      const camera = scene.camera || {};
      const lighting = scene.lighting || {};
      const mood = scene.mood || {};
      const styleControl = scene.styleControl || {
        stylePreset: "unspecified",
        allow_stylization: false,
        required_keywords_en: [],
        forbidden_keywords_en: []
      };

      const subjectDescriptions = subjects
        .filter((s) => s.type === "human")
        .map((s) => s.description_en || "a person")
        .join(" and ") || "two people";

      const relationship = scene.relationship || "unspecified";
      const relationshipPhrase =
        relationship === "couple"
          ? "who seem like a couple"
          : relationship === "friends"
          ? "who seem like close friends"
          : relationship === "family"
          ? "who seem like family"
          : "";

      const actionLineParts = [
        primary_action.main_verb_en,
        primary_action.detail_en,
        primary_action.emotional_change_en ? "their mood shifts " + primary_action.emotional_change_en : ""
      ].filter(Boolean);
      const actionLine = actionLineParts.join(", ");

      const locationText =
        location.detail_en ||
        location.name_en ||
        "an urban outdoor location";

      let timeOfDayText = "";
      switch (environment.timeOfDay) {
        case "night": timeOfDayText = "at night"; break;
        case "golden_hour": timeOfDayText = "during golden hour"; break;
        case "day": timeOfDayText = "during the day"; break;
        case "dawn": timeOfDayText = "at dawn"; break;
        case "dusk": timeOfDayText = "at dusk"; break;
        default: timeOfDayText = "";
      }

      let weatherText = "";
      switch (environment.weather) {
        case "clear": weatherText = "clear weather"; break;
        case "rainy": weatherText = "in the rain"; break;
        case "snowy": weatherText = "in the snow"; break;
        case "foggy": weatherText = "foggy"; break;
        case "overcast": weatherText = "overcast"; break;
        default: weatherText = "";
      }

      const atmosphereText = environment.atmosphere_en || "";
      let colorGradingText = "naturalistic color grading";
      switch (environment.colorGrading) {
        case "warm":
          colorGradingText = "warm color grading with natural skin tones"; break;
        case "teal_orange":
          colorGradingText = "subtle teal and orange color grading"; break;
        case "monochrome":
          colorGradingText = "soft monochrome grading"; break;
        case "vibrant":
          colorGradingText = "vibrant but cinematic color grading"; break;
        case "muted":
          colorGradingText = "muted, understated color grading"; break;
      }

      // 화각·앵글: 섹션당 하나의 키워드만 사용 (상충 방지). 이미지 모델 표준 용어.
      const shotKeywordMap = {
        extreme_close_up: "extreme close-up",
        close_up: "close-up",
        medium_close_up: "medium close-up",
        medium: "medium shot",
        medium_wide: "medium wide shot",
        wide: "wide shot",
        extreme_wide: "extreme wide shot",
        long: "long shot"
      };
      // 앵글: 한 가지 표현만 사용. 괄호·동의어 제거해 무시/상충 방지.
      const angleKeywordMap = {
        eye_level: "eye level",
        low_angle: "low angle",
        high_angle: "high angle",
        top_down: "bird's eye view",
        worms_eye: "worm's eye view",
        dutch_angle: "dutch angle",
        over_shoulder: "over the shoulder",
        pov: "point of view",
        birds_eye_view: "bird's eye view",
        worms_eye_view: "worm's eye view",
        over_the_shoulder: "over the shoulder",
        point_of_view: "point of view",
        unspecified: ""
      };
      const movementTextMap = {
        static: "from a static camera",
        pan: "with a gentle pan",
        tilt: "with a slow tilt",
        dolly_in: "with a slow dolly in toward them",
        dolly_out: "with a slow dolly out",
        truck: "with a subtle sideways truck move",
        arc: "with a slow arcing movement around them",
        crane: "with a slow crane movement",
        handheld: "with a slightly handheld, natural feel",
        unspecified: ""
      };

      const shotKeyword = shotKeywordMap[camera.shot] || "medium shot";
      const angleKeyword = angleKeywordMap[camera.angle] || "eye level";
      const movementText = movementTextMap[camera.movement || "unspecified"] || "";
      const depthText = camera.depthOfField_en || "natural depth of field";

      let lightingDescription = lighting.description_en;
      if (!lightingDescription) {
        switch (lighting.style) {
          case "natural":
            lightingDescription = "natural, soft lighting"; break;
          case "low_key":
            lightingDescription = "low key lighting with strong contrast and deep shadows"; break;
          case "high_key":
            lightingDescription = "bright, high key lighting with soft shadows"; break;
          case "golden_hour":
            lightingDescription = "warm golden hour light"; break;
          case "volumetric":
            lightingDescription = "dramatic volumetric lighting with visible light beams"; break;
          default:
            lightingDescription = "cinematic lighting";
        }
      }

      const requiredKeywordsArr = Array.isArray(styleControl.required_keywords_en)
        ? styleControl.required_keywords_en.slice()
        : [];
      const forbiddenKeywordsArr = Array.isArray(styleControl.forbidden_keywords_en)
        ? styleControl.forbidden_keywords_en.slice()
        : [];

      // 장르 오버라이드: 선택된 장르에 따라 톤·스타일 키워드를 극단적으로 고정
      const genre = scene.genrePreset || "auto";
      if (!scene.mood) scene.mood = {};
      switch (genre) {
        case "coming_of_age":
          scene.mood.tone_en = "coming-of-age Korean youth drama";
          requiredKeywordsArr.push("naturalistic acting", "subtle emotions", "warm but realistic tone");
          break;
        case "dreamy_romance":
          scene.mood.tone_en = "dreamy, soft Korean romance film";
          requiredKeywordsArr.push("soft focus", "pastel colors", "gentle romantic atmosphere");
          break;
        case "gritty_noir":
          scene.mood.tone_en = "gritty urban noir";
          colorGradingText = "dark, contrasty noir-inspired grading";
          requiredKeywordsArr.push("low key lighting", "urban night streets", "grainy texture");
          break;
        case "slice_of_life":
          scene.mood.tone_en = "quiet slice-of-life realism";
          requiredKeywordsArr.push("simple everyday setting", "unaffected naturalism");
          break;
        case "thriller":
          scene.mood.tone_en = "tense, suspenseful cinematic thriller";
          requiredKeywordsArr.push("high contrast lighting", "heightened tension", "tight framing");
          break;
      }

      let stylePresetText;
      switch (styleControl.stylePreset) {
        case "korean_urban_romance_film":
          stylePresetText = "A cinematic still frame from a modern Korean urban romance film, shot on 35mm."; break;
        case "korean_indie_drama":
          stylePresetText = "A quiet, cinematic still from a Korean indie drama."; break;
        case "hollywood_blockbuster":
          stylePresetText = "A cinematic still from a Hollywood film."; break;
        case "documentary":
          stylePresetText = "A realistic still from a documentary film."; break;
        default:
          stylePresetText = "A cinematic film still.";
      }

      const moodText = mood && mood.tone_en ? mood.tone_en : "";
      const requiredKeywords = requiredKeywordsArr.join(", ");
      const forbiddenKeywords = forbiddenKeywordsArr.join(", ");

      const lines = [];
      lines.push(stylePresetText);
      lines.push("");

      if (genre && genre !== "auto") {
        lines.push("--- GENRE ---");
        lines.push(genre);
        lines.push("");
      }

      // --- 섹션 구분: 각 블록이 하나의 역할만 담당해 상충·무시 방지 ---
      lines.push("--- SHOT ---");
      lines.push(shotKeyword);
      lines.push("");

      lines.push("--- CAMERA ANGLE ---");
      lines.push(angleKeyword);
      lines.push("");

      lines.push("--- CHARACTERS ---");
      if (scene.personas && Array.isArray(scene.personas) && scene.personas.length) {
        lines.push(scene.personas.join(", "));
      } else {
        lines.push(subjectDescriptions + (relationshipPhrase ? ". " + relationshipPhrase : ""));
      }
      lines.push("");

      lines.push("--- SCENE / ACTION ---");
      const isActionGenre = ["gritty_noir", "thriller"].includes(genre);
      const isRomanceGenre = ["dreamy_romance", "coming_of_age"].includes(genre);
      let cameraIntent = "";
      switch (camera.angle) {
        case "low_angle":
          cameraIntent = "The camera is positioned very low near the ground, looking up at a dramatic angle toward the characters."; break;
        case "high_angle":
          cameraIntent = "The camera looks down from high above, making the characters appear smaller in the space."; break;
        case "pov":
          cameraIntent = "The shot is from a point-of-view perspective, as if seen directly through the character's eyes."; break;
        case "top_down":
        case "birds_eye_view":
          cameraIntent = "The camera is directly above, flattening the space below in a bird's eye view."; break;
        case "worms_eye":
        case "worms_eye_view":
          cameraIntent = "The camera is extremely low, in a worm's eye view that exaggerates the vertical scale of the scene."; break;
        default:
          cameraIntent = "";
      }
      let actionSentence = actionLine || "figures in frame.";
      if (isRomanceGenre && camera.angle === "low_angle") {
        actionSentence = `${subjectDescriptions} look at each other with soft, warm expressions, leaning slightly toward one another as if sharing a private moment.`;
      }
      const sceneSentence = actionSentence + (cameraIntent ? " " + cameraIntent : "");
      lines.push((relationshipPhrase ? relationshipPhrase + ". " : "") + sceneSentence);
      lines.push("");

      lines.push("--- LOCATION ---");
      let horizonLine = "";
      switch (camera.angle) {
        case "low_angle":
          horizonLine = "The horizon is pushed to the bottom of the frame to emphasize the vast sky."; break;
        case "high_angle":
          horizonLine = "The ground fills most of the frame, with almost no horizon visible near the top of the image."; break;
        default:
          horizonLine = "";
      }
      lines.push(locationText + (horizonLine ? ". " + horizonLine : ""));
      lines.push("");

      lines.push("--- TIME & WEATHER ---");
      const timeWeather = [timeOfDayText, weatherText].filter(Boolean).join(", ") || "daytime, clear";
      lines.push(timeWeather);
      lines.push("");

      lines.push("--- LIGHTING ---");
      let angleLighting = "";
      if (isRomanceGenre) {
        angleLighting =
          "Soft, cinematic golden hour-style glow wraps around the figures. Use a warm rim light to separate them gently from the background, with no harsh shadows on faces.";
      } else {
        switch (camera.angle) {
          case "low_angle":
            angleLighting = "Use dramatic under-lighting and high contrast shadows to reinforce the powerful low angle."; break;
          case "high_angle":
            angleLighting = "Soft overhead light reinforces the high viewpoint from above."; break;
          default:
            angleLighting = "";
        }
      }
      const lightingSentence =
        lightingDescription +
        ". " +
        depthText +
        (atmosphereText ? ". " + atmosphereText : "") +
        ". " +
        colorGradingText +
        (angleLighting ? ". " + angleLighting : "");
      lines.push(lightingSentence);
      lines.push("");

      if (moodText) {
        lines.push("--- MOOD ---");
        lines.push(moodText);
        lines.push("");
      }
      if (requiredKeywords) {
        lines.push("--- KEYWORDS ---");
        lines.push(requiredKeywords);
        lines.push("");
      }
      if (forbiddenKeywords) {
        lines.push("--- AVOID ---");
        lines.push(forbiddenKeywords);
      }
      return lines.join("\n");
    }

    // ===== 2) Groq: 한국어 → SceneSchema JSON (백엔드 /api/scene 경유) =====
    async function koreanToSceneSchemaGroq(koreanText) {
      const res = await fetch("/api/scene", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ koreanText })
      });

      if (!res.ok) {
        const txt = await res.text();
        throw new Error("Backend error: " + txt);
      }

      const scene = await res.json();
      return scene;
    }

    // ===== 3) UI 연결 =====
    const koInput = document.getElementById("ko-input");
    const generateBtn = document.getElementById("generate-btn");
    const promptOutput = document.getElementById("prompt-output");
    const statusRight = document.getElementById("status-right");
    const copyBtn = document.getElementById("copy-btn");
    const modelSelect = document.getElementById("model-select");
    const historyList = document.getElementById("history-list");
    const genreGroup = document.getElementById("genre-group");
    const shotGroup = document.getElementById("shot-group");
    const angleGroup = document.getElementById("angle-group");
    const timeGroup = document.getElementById("time-group");
    const weatherGroup = document.getElementById("weather-group");
    const directorGroup = document.getElementById("director-group");
    const personaRow = document.getElementById("persona-row");
    const personaAddBtn = document.getElementById("persona-add");

    let genreOverride = "";
    let shotOverride = "";
    let angleOverride = "";
    let timeOverride = "";
    let weatherOverride = "";
    let directorOverride = "none";
    let historyCounter = 0;

    function setStatusRight(text, isError) {
      setStatus(statusRight, text, isError);
    }

    function setStatus(el, text, isError) {
      el.textContent = text;
      if (isError) el.classList.add("error");
      else el.classList.remove("error");
    }

    function applyDirectorOverrides(scene) {
      const override = directorOverride;
      if (!override || override === "none") return scene;

      scene.styleControl = scene.styleControl || {
        stylePreset: "unspecified",
        allow_stylization: true,
        required_keywords_en: [],
        forbidden_keywords_en: []
      };
      scene.mood = scene.mood || {};

      switch (override) {
        case "park_chan_wook":
          scene.styleControl.stylePreset = "korean_indie_drama";
          scene.mood.tone_en = "dark, tense, meticulously composed like a Park Chan-wook film";
          scene.styleControl.required_keywords_en.push("highly composed framing", "Korean auteur cinema");
          break;
        case "bong_joon_ho":
          scene.styleControl.stylePreset = "korean_urban_romance_film";
          scene.mood.tone_en = "realistic, slightly satirical, with social tension like a Bong Joon-ho film";
          scene.styleControl.required_keywords_en.push("Korean realist cinema", "subtle social commentary");
          break;
        case "greta_gerwig":
          scene.styleControl.stylePreset = "korean_urban_romance_film";
          scene.mood.tone_en = "warm, tender, youth-driven energy like a Greta Gerwig film";
          scene.styleControl.required_keywords_en.push("soft pastel colors", "gentle whimsical tone");
          break;
        case "nolan":
          scene.styleControl.stylePreset = "hollywood_blockbuster";
          scene.mood.tone_en = "epic, serious, high-stakes atmosphere like a Christopher Nolan film";
          scene.styleControl.required_keywords_en.push("strong contrast lighting", "precise, dramatic framing");
          break;
      }

      return scene;
    }

    function applyCameraOverrides(scene) {
      scene.camera = scene.camera || {};
      scene.environment = scene.environment || {};
      if (genreOverride) {
        scene.genrePreset = genreOverride;
      }

      if (shotOverride) {
        scene.camera.shot = shotOverride;
      }
      if (angleOverride) {
        scene.camera.angle = angleOverride;
      }
      if (timeOverride) {
        scene.environment.timeOfDay = timeOverride;
      }
      if (weatherOverride) {
        scene.environment.weather = weatherOverride;
      }

      return scene;
    }

    function setupPillGroup(groupEl, onChange, initialValue) {
      if (!groupEl) return;
      const buttons = Array.from(groupEl.querySelectorAll(".pill-button, .shot-thumb"));
      if (initialValue !== undefined) {
        buttons.forEach((btn) => {
          if ((btn.getAttribute("data-value") || "") === initialValue) {
            btn.classList.add("active");
          } else {
            btn.classList.remove("active");
          }
        });
      }
      groupEl.addEventListener("click", (e) => {
        let target = e.target;
        if (!(target instanceof HTMLElement)) return;
        if (target.closest(".shot-thumb")) {
          target = target.closest(".shot-thumb");
        }
        if (!target.classList.contains("pill-button") && !target.classList.contains("shot-thumb")) return;
        e.preventDefault();
        const val = target.getAttribute("data-value") || "";
        buttons.forEach((btn) => {
          if (btn === target) btn.classList.add("active");
          else btn.classList.remove("active");
        });
        onChange(val);
      });
    }

    // 나노 바나나 등 특정 모델용 프롬프트 후처리
    function postProcessPromptForModel(prompt, options) {
      const { model, genre, cameraAngle } = options || {};
      let out = prompt;

      const isRomanceGenre = ["dreamy_romance", "coming_of_age"].includes(genre);

      // 1) 로맨스/청춘 장르: 거친 단어 제거 후 부드러운 톤 보강
      if (model === "nanobanana" && isRomanceGenre) {
        out = out.replace(/\b(harsh|aggressive|grim|violent|menacing)\b/gi, "");
        if (!/dreamy/gi.test(out)) {
          out += "\nDreamy, soft, gentle romantic atmosphere.";
        }
      }

      // 2) 로우 앵글일 때 카메라 위치/각도 문구를 강하게 유지
      if (model === "nanobanana" && cameraAngle === "low_angle") {
        if (!/very low near the ground/gi.test(out)) {
          out = out.replace(
            /The camera is positioned[^.]*\./i,
            "The camera is positioned very low near the ground, looking up at a dramatic angle toward the characters."
          );
        }
      }

      return out;
    }

    setupPillGroup(genreGroup, (val) => { genreOverride = val; }, genreOverride);
    setupPillGroup(shotGroup, (val) => { shotOverride = val; }, shotOverride);
    setupPillGroup(angleGroup, (val) => { angleOverride = val; }, angleOverride);
    setupPillGroup(timeGroup, (val) => { timeOverride = val; }, timeOverride);
    setupPillGroup(weatherGroup, (val) => { weatherOverride = val; }, weatherOverride);
    setupPillGroup(directorGroup, (val) => { directorOverride = val || "none"; }, directorOverride);

    function addHistoryItem(text) {
      if (!historyList || !text.trim()) return;
      const id = ++historyCounter;
      const item = document.createElement("div");
      item.className = "history-item";
      item.setAttribute("data-id", String(id));

      const preview = document.createElement("div");
      preview.className = "history-text";
      preview.textContent = text;

      const meta = document.createElement("div");
      meta.className = "history-meta";
      const label = document.createElement("span");
      label.textContent = "Prompt " + id;
      const actions = document.createElement("div");
      actions.className = "history-actions";

      const likeBtn = document.createElement("button");
      likeBtn.type = "button";
      likeBtn.className = "history-btn history-like";
      likeBtn.textContent = "좋아요";

      const deleteBtn = document.createElement("button");
      deleteBtn.type = "button";
      deleteBtn.className = "history-btn history-delete";
      deleteBtn.textContent = "삭제";

      actions.appendChild(likeBtn);
      actions.appendChild(deleteBtn);
      meta.appendChild(label);
      meta.appendChild(actions);

      item.appendChild(preview);
      item.appendChild(meta);

      historyList.insertBefore(item, historyList.firstChild);
    }

    function getPersonas() {
      if (!personaRow) return [];
      const inputs = Array.from(personaRow.querySelectorAll(".persona-input"));
      return inputs
        .map((el) => (el.value || "").trim())
        .filter((v) => v.length > 0);
    }

    if (personaAddBtn && personaRow) {
      personaRow.addEventListener("click", (e) => {
        const removeBtn = e.target && e.target.classList && e.target.classList.contains("persona-remove");
        if (removeBtn) {
          e.preventDefault();
          const item = e.target.closest(".persona-item");
          if (item && personaRow.querySelectorAll(".persona-item").length > 1) {
            item.remove();
          }
        }
      });
      personaAddBtn.addEventListener("click", (e) => {
        e.preventDefault();
        const count = personaRow.querySelectorAll(".persona-input").length;
        const label = String.fromCharCode(65 + count);
        const item = document.createElement("div");
        item.className = "persona-item";
        const input = document.createElement("input");
        input.className = "persona-input";
        input.type = "text";
        input.placeholder = "인물 " + label;
        input.style.padding = "4px 8px";
        input.style.border = "none";
        input.style.background = "transparent";
        input.style.color = "#e5e7eb";
        input.style.fontSize = "12px";
        input.style.minWidth = "72px";
        const removeBtn = document.createElement("button");
        removeBtn.className = "persona-remove";
        removeBtn.type = "button";
        removeBtn.title = "삭제";
        removeBtn.textContent = "×";
        item.appendChild(input);
        item.appendChild(removeBtn);
        personaRow.insertBefore(item, personaAddBtn);
        input.focus();
      });
    }

    generateBtn.addEventListener("click", async () => {
      const text = koInput.value.trim();
      if (!text) {
        setStatusRight("한국어 장면 설명을 먼저 입력하세요.", true);
        return;
      }

      promptOutput.textContent = "";
      setStatusRight("Groq로 SceneSchema 생성 중...", false);

      try {
        let scene = await koreanToSceneSchemaGroq(text);
        const personas = getPersonas();
        if (personas.length) {
          scene.personas = personas;
        }
        scene = applyCameraOverrides(scene);
        scene = applyDirectorOverrides(scene);
        const prompt = buildPromptFromScene(scene);

        const model = modelSelect ? (modelSelect.value || "generic") : "generic";
        const finalPrompt =
          model === "nanobanana"
            ? postProcessPromptForModel(prompt, {
                model,
                genre: scene.genrePreset || "auto",
                cameraAngle: scene.camera && scene.camera.angle
              })
            : prompt;

        promptOutput.textContent = finalPrompt;
        addHistoryItem(finalPrompt);
        setStatusRight("SceneSchema · 프롬프트 생성 완료.", false);
      } catch (e) {
        setStatusRight("SceneSchema 생성 실패: " + e.message, true);
      }
    });

    if (historyList) {
      historyList.addEventListener("click", (e) => {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        const item = target.closest(".history-item");
        if (!item) return;
        if (target.classList.contains("history-delete")) {
          e.preventDefault();
          item.remove();
          return;
        }
        if (target.classList.contains("history-like")) {
          e.preventDefault();
          target.classList.toggle("history-liked");
          return;
        }
      });
    }

    copyBtn.addEventListener("click", async () => {
      const text = promptOutput.textContent || "";
      if (!text.trim()) return;
      try {
        await navigator.clipboard.writeText(text);
        setStatus(statusRight, "프롬프트를 클립보드에 복사했습니다.", false);
      } catch {
        setStatus(statusRight, "클립보드 복사 실패.", true);
      }
    });
  </script>
</body>
</html>
