<!-- TODO: 디렉터 컨트롤 앵글 썸네일 단일 미리보기 및 히스토리/레이아웃 개선 반영 -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>promman – Groq prototype</title>
  <style>
    * {
      caret-color: transparent;
    }
    input,
    textarea {
      caret-color: #e5e7eb;
    }
    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020617;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    header {
      padding: 20px 16px 16px;
      background: #000000;
      border-bottom: 1px solid #111827;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .logo-image {
      width: 360px;
      max-width: 95vw;
      border-radius: 0;
      overflow: hidden;
    }
    .logo-image img {
      display: block;
      width: 100%;
      height: auto;
    }
    header h1 {
      display: none;
    }
    header span.sub { display: none; }
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 0.9fr 1.5fr 0.8fr;
      min-height: 0;
      overflow: hidden;
    }
    .column {
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-left: 1px solid #111827;
    }
    .column:first-child { border-left: none; }
    .column:nth-child(1),
    .column:nth-child(2),
    .column:nth-child(3) {
      min-height: 0;
    }
    .column:nth-child(1),
    .column:nth-child(2) {
      overflow-y: auto;
    }
    .director-controls-inner {
      width: 100%;
      min-width: 0;
    }

    .section-header {
      padding: 8px 12px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ca3af;
      border-bottom: 1px solid #111827;
      background: #000000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .section-header span.sub2 {
      font-size: 11px;
      text-transform: none;
      letter-spacing: 0;
      color: #6b7280;
    }

    textarea {
      border: none;
      resize: none;
      padding: 12px;
      background: #020617;
      color: #e5e7eb;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
      line-height: 1.5;
      outline: none;
      border-radius: 0;
      width: 100%;
      box-sizing: border-box;
    }

    .ko-input-wrapper {
      padding: 10px 12px;
      border-bottom: 1px solid #111827;
    }
    .ko-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .ko-row textarea {
      flex: 1;
      min-height: 80px;
      max-height: 150px;
    }

    .btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 999px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
    }
    .btn:hover { background: #2563eb; }
    .btn.secondary {
      background: #111827;
      color: #e5e7eb;
      border: 1px solid #374151;
    }
    .btn.secondary:hover { background: #1f2937; }

    .status {
      font-size: 11px;
      color: #9ca3af;
      padding: 4px 12px 0;
    }
    .status.error { color: #f97373; }

    .output {
      flex: 1;
      min-height: 0;
      padding: 12px;
      background: #020617;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      overflow: auto;
    }

    .footer {
      padding: 8px 12px;
      border-top: 1px solid #1f2937;
      background: #000000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      position: sticky;
      bottom: 0;
      z-index: 5;
    }
    .right-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      user-select: none;
    }

    .pill-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }
    .pill-button {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid #374151;
      background: #020617;
      color: #9ca3af;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }
    .pill-button:hover {
      background: #111827;
      color: #e5e7eb;
    }
    .pill-button.active {
      background: #3b82f6;
      border-color: #3b82f6;
      color: #ffffff;
    }
    .shot-thumb-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-top: 4px;
      width: 100%;
      min-width: 0;
    }
    .shot-thumb {
      background: #020617;
      border-radius: 8px;
      border: 1px solid #1f2937;
      padding: 3px;
      width: 100%;
      min-width: 0;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
    }
    .shot-thumb img {
      width: 100%;
      height: 0;
      padding-bottom: 56.25%; /* 16:9 */
      object-fit: cover;
      border-radius: 6px;
      display: block;
    }
    .shot-thumb span {
      margin-top: 3px;
      font-size: 10px;
      color: #d1d5db;
    }
    .shot-thumb.active {
      border-color: #3b82f6;
      box-shadow: 0 0 0 1px rgba(59,130,246,0.6);
      transform: translateY(-1px);
    }
    .select {
      background: #020617;
      color: #e5e7eb;
      border-radius: 999px;
      border: 1px solid #374151;
      padding: 5px 10px;
      font-size: 11px;
    }
    .badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 999px;
      background: #000000;
      border: 1px solid #374151;
      color: #9ca3af;
    }
    .persona-item {
      display: inline-flex;
      align-items: center;
      gap: 0;
      border-radius: 999px;
      background: #020617;
      border: 1px solid #374151;
      overflow: hidden;
    }
    .persona-remove {
      width: 18px;
      height: 18px;
      padding: 0;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: #6b7280;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .persona-remove:hover {
      background: #111827;
      color: #f97373;
    }

    .history-list {
      padding: 10px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .history-item {
      border-radius: 8px;
      border: 1px solid #1f2937;
      background: #020617;
      padding: 8px 10px;
      font-size: 11px;
      color: #d1d5db;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .history-text {
      max-height: 0;
      overflow: hidden;
      white-space: pre-wrap;
      transition: max-height 0.15s ease;
    }
    .history-item.open .history-text {
      max-height: 240px;
    }
    .history-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #6b7280;
    }
    .history-title {
      font-size: 12px;
      font-weight: 600;
      color: #e5e7eb;
    }
    .history-actions {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .history-btn {
      border: none;
      border-radius: 999px;
      padding: 3px 6px;
      font-size: 10px;
      cursor: pointer;
      background: #020617;
      color: #9ca3af;
      border: 1px solid #374151;
    }
    .history-btn:hover {
      background: #111827;
      color: #e5e7eb;
    }
    .history-like.history-liked {
      background: #facc15;
      border-color: #eab308;
      color: #111827;
    }

    /* 공용 선택 팝업 */
    #picker-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: transparent;
      z-index: 40;
    }
    #picker-panel {
      position: absolute;
      right: 16px;
      top: 120px;
      max-height: 360px;
      width: 260px;
      background: #020617;
      border-radius: 10px;
      border: 1px solid #111827;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      box-shadow: 0 18px 40px rgba(0,0,0,0.8);
    }
    #picker-options {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

  </style>
</head>
<body>
  <header>
    <div class="logo-image">
      <img src="promman-hero.png" alt="PROMMAN hero image">
    </div>
    <h1><span>prom</span>man</h1>
    <span class="sub"></span>
  </header>

  <main>
    <!-- 히스토리 컬럼 -->
    <section class="column">
      <div class="section-header">
        <span>Prompt History</span>
        <span class="sub2">즐겨찾기 · 과거 프롬프트</span>
      </div>
      <div id="history-list" class="history-list"></div>
    </section>

    <!-- 가운데: 한국어 입력 + 결과 프롬프트 -->
    <section class="column">
      <div class="section-header">
        <span>Generated Cinematic Prompt</span>
        <span class="sub2">시네마틱 프롬프트 번역기</span>
      </div>
      <!-- 페르소나 설정 -->
      <div class="ko-input-wrapper" style="border-bottom:none; border-top:1px solid #111827;">
        <div class="status" style="padding-left:0; padding-bottom:4px;">페르소나</div>
        <div id="persona-row" style="display:flex; align-items:center; gap:6px; flex-wrap:wrap;">
          <div class="persona-item">
            <input class="persona-input" type="text" placeholder="인물 A" style="padding:4px 8px; border:none; background:transparent; color:#e5e7eb; font-size:12px; min-width:72px;">
            <button class="persona-remove" type="button" title="삭제">×</button>
          </div>
          <button id="persona-add" class="btn secondary" type="button" style="flex-shrink:0; padding:4px 10px; font-size:11px;">+ 사람 추가</button>
        </div>
      </div>
      <div class="ko-input-wrapper">
        <div class="ko-row">
          <textarea id="ko-input" placeholder="여기에 장면을 한국어로 적어보세요.&#10;예) 한국 남녀가 풋풋하게 종로 호프에서 맥주를 마시고 있다"></textarea>
          <button class="btn" id="generate-btn">프롬프트</button>
        </div>
      </div>
      <div id="prompt-output" class="output"></div>
      <div class="footer">
        <span id="status-right" class="status">아직 생성되지 않았습니다.</span>
        <div class="right-controls">
          <select id="model-select" class="select">
            <option value="generic">Generic</option>
            <option value="nanobanana">Nanobanana</option>
            <option value="kling">Kling</option>
          </select>
          <button class="btn secondary" id="copy-btn">프롬프트 복사</button>
        </div>
      </div>
    </section>

    <!-- 오른쪽: 촬영감독 컨트롤 패널 -->
    <section class="column">
      <div class="section-header">
        <span>Director Controls</span>
        <span class="sub2">장르 · 카메라 · 시간</span>
      </div>
      <div class="director-controls-inner" style="padding: 10px 12px; display: flex; flex-direction: column; gap: 10px;">
        <!-- 장르 / 무드 (썸네일 1개 프리뷰) -->
        <div>
          <div class="status" style="padding-left:0;">장르 / 무드</div>
          <button id="genre-preview" class="shot-thumb" type="button">
            <img src="genre-drama.png" alt="장르 thumbnail">
            <span>Drama</span>
          </button>
        </div>

        <!-- 카메라 화각 (Shot) 프리뷰 -->
        <div>
          <div class="status" style="padding-left:0;">카메라 화각 (Shot)</div>
          <button id="shot-preview" class="shot-thumb" type="button">
            <img src="shot-medium-shot.png" alt="Shot thumbnail">
            <span>Medium Shot</span>
          </button>
        </div>

        <!-- 카메라 앵글 (Angle) 프리뷰 -->
        <div>
          <div class="status" style="padding-left:0;">카메라 앵글 (Angle)</div>
          <button id="angle-preview" class="shot-thumb" type="button">
            <img src="angle-eye-level.png" alt="Angle thumbnail">
            <span>Eye Level</span>
          </button>
        </div>

        <!-- 시간 (새벽·낮·노을·밤) 프리뷰 -->
        <div>
          <div class="status" style="padding-left:0;">시간</div>
          <button id="time-preview" class="shot-thumb" type="button">
            <img src="time-day.png" alt="Time thumbnail">
            <span>낮</span>
          </button>
        </div>

        <!-- 날씨 프리뷰 -->
        <div>
          <div class="status" style="padding-left:0;">날씨</div>
          <button id="weather-preview" class="shot-thumb" type="button">
            <img src="weather-clear.png" alt="Weather thumbnail">
            <span>맑음</span>
          </button>
        </div>
      </div>
    </section>
  </main>

  <!-- 선택 팝업 오버레이 -->
  <div id="picker-overlay">
    <div id="picker-panel">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span id="picker-title" style="font-size:12px; color:#9ca3af;">선택</span>
        <button id="picker-close" class="btn secondary" type="button" style="padding:2px 8px; font-size:10px;">닫기</button>
      </div>
      <div id="picker-options"></div>
    </div>
  </div>

  <script>
    // ===== 1) SceneSchema → 프롬프트 빌더 (규칙 기반) =====
    function buildPromptFromScene(scene) {
      const subjects = scene.subjects || [];
      const primary_action = scene.primary_action || {};
      const location = scene.location || {};
      const environment = scene.environment || {};
      const camera = scene.camera || {};
      const lighting = scene.lighting || {};
      const mood = scene.mood || {};
      const styleControl = scene.styleControl || {
        stylePreset: "unspecified",
        allow_stylization: false,
        required_keywords_en: [],
        forbidden_keywords_en: []
      };

      const subjectDescriptions = subjects
        .filter((s) => s.type === "human")
        .map((s) => s.description_en || "a person")
        .join(" and ") || "two people";

      const relationship = scene.relationship || "unspecified";
      const relationshipPhrase =
        relationship === "couple"
          ? "who seem like a couple"
          : relationship === "friends"
          ? "who seem like close friends"
          : relationship === "family"
          ? "who seem like family"
          : "";

      const actionLineParts = [
        primary_action.main_verb_en,
        primary_action.detail_en,
        primary_action.emotional_change_en ? "their mood shifts " + primary_action.emotional_change_en : ""
      ].filter(Boolean);
      const actionLine = actionLineParts.join(", ");

      const locationText =
        location.detail_en ||
        location.name_en ||
        "an urban outdoor location";

      let timeOfDayText = "";
      switch (environment.timeOfDay) {
        case "night": timeOfDayText = "at night"; break;
        case "golden_hour": timeOfDayText = "during golden hour"; break;
        case "day": timeOfDayText = "during the day"; break;
        case "dawn": timeOfDayText = "at dawn"; break;
        case "dusk": timeOfDayText = "at dusk"; break;
        default: timeOfDayText = "";
      }

      let weatherText = "";
      switch (environment.weather) {
        case "clear": weatherText = "clear weather"; break;
        case "rainy": weatherText = "in the rain"; break;
        case "snowy": weatherText = "in the snow"; break;
        case "foggy": weatherText = "foggy"; break;
        case "overcast": weatherText = "overcast"; break;
        default: weatherText = "";
      }

      const atmosphereText = environment.atmosphere_en || "";
      let colorGradingText = "naturalistic color grading";
      switch (environment.colorGrading) {
        case "warm":
          colorGradingText = "warm color grading with natural skin tones"; break;
        case "teal_orange":
          colorGradingText = "subtle teal and orange color grading"; break;
        case "monochrome":
          colorGradingText = "soft monochrome grading"; break;
        case "vibrant":
          colorGradingText = "vibrant but cinematic color grading"; break;
        case "muted":
          colorGradingText = "muted, understated color grading"; break;
      }

      // 화각·앵글: 섹션당 하나의 키워드만 사용 (상충 방지). 이미지 모델 표준 용어.
      const shotKeywordMap = {
        extreme_close_up: "extreme close-up",
        close_up: "close-up",
        medium_close_up: "medium close-up",
        medium: "medium shot",
        medium_wide: "medium wide shot",
        wide: "wide shot",
        extreme_wide: "extreme wide shot",
        long: "long shot"
      };
      // 앵글: 한 가지 표현만 사용. 괄호·동의어 제거해 무시/상충 방지.
      const angleKeywordMap = {
        eye_level: "eye level",
        low_angle: "low angle",
        high_angle: "high angle",
        top_down: "bird's eye view",
        worms_eye: "worm's eye view",
        dutch_angle: "dutch angle",
        over_shoulder: "over the shoulder",
        pov: "point of view",
        birds_eye_view: "bird's eye view",
        worms_eye_view: "worm's eye view",
        over_the_shoulder: "over the shoulder",
        point_of_view: "point of view",
        unspecified: ""
      };
      const movementTextMap = {
        static: "from a static camera",
        pan: "with a gentle pan",
        tilt: "with a slow tilt",
        dolly_in: "with a slow dolly in toward them",
        dolly_out: "with a slow dolly out",
        truck: "with a subtle sideways truck move",
        arc: "with a slow arcing movement around them",
        crane: "with a slow crane movement",
        handheld: "with a slightly handheld, natural feel",
        unspecified: ""
      };

      const shotKeyword = shotKeywordMap[camera.shot] || "medium shot";
      const angleKeyword = angleKeywordMap[camera.angle] || "eye level";
      const movementText = movementTextMap[camera.movement || "unspecified"] || "";
      const depthText = camera.depthOfField_en || "natural depth of field";

      let lightingDescription = lighting.description_en;
      if (!lightingDescription) {
        switch (lighting.style) {
          case "natural":
            lightingDescription = "natural, soft lighting"; break;
          case "low_key":
            lightingDescription = "low key lighting with strong contrast and deep shadows"; break;
          case "high_key":
            lightingDescription = "bright, high key lighting with soft shadows"; break;
          case "golden_hour":
            lightingDescription = "warm golden hour light"; break;
          case "volumetric":
            lightingDescription = "dramatic volumetric lighting with visible light beams"; break;
          default:
            lightingDescription = "cinematic lighting";
        }
      }

      const requiredKeywordsArr = Array.isArray(styleControl.required_keywords_en)
        ? styleControl.required_keywords_en.slice()
        : [];
      const forbiddenKeywordsArr = Array.isArray(styleControl.forbidden_keywords_en)
        ? styleControl.forbidden_keywords_en.slice()
        : [];

      // 장르 오버라이드: 선택된 장르에 따라 톤·스타일 키워드를 극단적으로 고정
      const genre = scene.genrePreset || "auto";
      if (!scene.mood) scene.mood = {};
      switch (genre) {
        case "action":
          scene.mood.tone_en = "dynamic, high-energy action film";
          requiredKeywordsArr.push("strong motion", "dynamic posing", "heightened tension");
          break;
        case "romance":
          scene.mood.tone_en = "soft, emotional romance film";
          requiredKeywordsArr.push("gentle intimacy", "warm atmosphere", "tender connection");
          break;
        case "thriller":
          scene.mood.tone_en = "tense, suspenseful thriller";
          requiredKeywordsArr.push("heightened tension", "nervous anticipation", "dark atmosphere");
          colorGradingText = "dark, contrasty thriller-inspired grading";
          break;
        case "documentary":
          scene.mood.tone_en = "grounded, realistic documentary style";
          requiredKeywordsArr.push("natural light", "unposed realism", "subtle camera presence");
          break;
        case "animation":
          scene.mood.tone_en = "stylized, expressive animation look";
          requiredKeywordsArr.push("bold color shapes", "clear silhouettes", "slightly exaggerated expressions");
          break;
        case "drama":
          scene.mood.tone_en = "quiet, introspective drama";
          requiredKeywordsArr.push("subtle expressions", "everyday realism", "soft but present tension");
          break;
      }

      let stylePresetText;
      switch (styleControl.stylePreset) {
        case "korean_urban_romance_film":
          stylePresetText = "A cinematic still frame from a modern Korean urban romance film, shot on 35mm."; break;
        case "korean_indie_drama":
          stylePresetText = "A quiet, cinematic still from a Korean indie drama."; break;
        case "hollywood_blockbuster":
          stylePresetText = "A cinematic still from a Hollywood film."; break;
        case "documentary":
          stylePresetText = "A realistic still from a documentary film."; break;
        default:
          stylePresetText = "A cinematic film still.";
      }

      const moodText = mood && mood.tone_en ? mood.tone_en : "";
      const requiredKeywords = requiredKeywordsArr.join(", ");
      const forbiddenKeywords = forbiddenKeywordsArr.join(", ");

      const lines = [];
      lines.push(stylePresetText);
      lines.push("");

      if (genre && genre !== "auto") {
        lines.push("--- GENRE ---");
        lines.push(genre);
        lines.push("");
      }

      // --- 섹션 구분: 각 블록이 하나의 역할만 담당해 상충·무시 방지 ---
      lines.push("--- SHOT ---");
      lines.push(shotKeyword);
      lines.push("");

      lines.push("--- CAMERA ANGLE ---");
      lines.push(angleKeyword);
      lines.push("");

      lines.push("--- CHARACTERS ---");
      if (scene.personas && Array.isArray(scene.personas) && scene.personas.length) {
        lines.push(scene.personas.join(", "));
      } else {
        lines.push(subjectDescriptions + (relationshipPhrase ? ". " + relationshipPhrase : ""));
      }
      lines.push("");

      lines.push("--- SCENE / ACTION ---");
      const isActionGenre = ["gritty_noir", "thriller"].includes(genre);
      const isRomanceGenre = ["dreamy_romance", "coming_of_age"].includes(genre);
      let cameraIntent = "";
      switch (camera.angle) {
        case "low_angle":
          cameraIntent = "The camera is positioned very low near the ground, looking up at a dramatic angle toward the characters."; break;
        case "high_angle":
          cameraIntent = "The camera looks down from high above, making the characters appear smaller in the space."; break;
        case "pov":
          cameraIntent = "The shot is from a point-of-view perspective, as if seen directly through the character's eyes."; break;
        case "top_down":
        case "birds_eye_view":
          cameraIntent = "The camera is directly above, flattening the space below in a bird's eye view."; break;
        case "worms_eye":
        case "worms_eye_view":
          cameraIntent = "The camera is extremely low, in a worm's eye view that exaggerates the vertical scale of the scene."; break;
        default:
          cameraIntent = "";
      }
      let actionSentence = actionLine || "figures in frame.";
      if (isRomanceGenre && camera.angle === "low_angle") {
        actionSentence = `${subjectDescriptions} look at each other with soft, warm expressions, leaning slightly toward one another as if sharing a private moment.`;
      }
      const sceneSentence = actionSentence + (cameraIntent ? " " + cameraIntent : "");
      lines.push((relationshipPhrase ? relationshipPhrase + ". " : "") + sceneSentence);
      lines.push("");

      lines.push("--- LOCATION ---");
      let horizonLine = "";
      switch (camera.angle) {
        case "low_angle":
          horizonLine = "The horizon is pushed to the bottom of the frame to emphasize the vast sky."; break;
        case "high_angle":
          horizonLine = "The ground fills most of the frame, with almost no horizon visible near the top of the image."; break;
        default:
          horizonLine = "";
      }
      lines.push(locationText + (horizonLine ? ". " + horizonLine : ""));
      lines.push("");

      lines.push("--- TIME & WEATHER ---");
      const timeWeather = [timeOfDayText, weatherText].filter(Boolean).join(", ") || "daytime, clear";
      lines.push(timeWeather);
      lines.push("");

      lines.push("--- LIGHTING ---");
      let angleLighting = "";
      if (isRomanceGenre) {
        angleLighting =
          "Soft, cinematic golden hour-style glow wraps around the figures. Use a warm rim light to separate them gently from the background, with no harsh shadows on faces.";
      } else {
        switch (camera.angle) {
          case "low_angle":
            angleLighting = "Use dramatic under-lighting and high contrast shadows to reinforce the powerful low angle."; break;
          case "high_angle":
            angleLighting = "Soft overhead light reinforces the high viewpoint from above."; break;
          default:
            angleLighting = "";
        }
      }
      const lightingSentence =
        lightingDescription +
        ". " +
        depthText +
        (atmosphereText ? ". " + atmosphereText : "") +
        ". " +
        colorGradingText +
        (angleLighting ? ". " + angleLighting : "");
      lines.push(lightingSentence);
      lines.push("");

      if (moodText) {
        lines.push("--- MOOD ---");
        lines.push(moodText);
        lines.push("");
      }
      if (requiredKeywords) {
        lines.push("--- KEYWORDS ---");
        lines.push(requiredKeywords);
        lines.push("");
      }
      if (forbiddenKeywords) {
        lines.push("--- AVOID ---");
        lines.push(forbiddenKeywords);
      }
      return lines.join("\n");
    }

    // ===== 2) Groq: 한국어 → SceneSchema JSON (백엔드 /api/scene 경유) =====
    async function koreanToSceneSchemaGroq(koreanText) {
      const res = await fetch("/api/scene", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ koreanText })
      });

      if (!res.ok) {
        const txt = await res.text();
        throw new Error("Backend error: " + txt);
      }

      const scene = await res.json();
      return scene;
    }

    // ===== 3) UI 연결 =====
    const koInput = document.getElementById("ko-input");
    const generateBtn = document.getElementById("generate-btn");
    const promptOutput = document.getElementById("prompt-output");
    const statusRight = document.getElementById("status-right");
    const copyBtn = document.getElementById("copy-btn");
    const modelSelect = document.getElementById("model-select");
    const historyList = document.getElementById("history-list");
    const genrePreview = document.getElementById("genre-preview");
    const shotPreview = document.getElementById("shot-preview");
    const anglePreview = document.getElementById("angle-preview");
    const timePreview = document.getElementById("time-preview");
    const weatherPreview = document.getElementById("weather-preview");
    const pickerOverlay = document.getElementById("picker-overlay");
    const pickerPanel = document.getElementById("picker-panel");
    const pickerTitle = document.getElementById("picker-title");
    const pickerOptions = document.getElementById("picker-options");
    const pickerClose = document.getElementById("picker-close");
    const personaRow = document.getElementById("persona-row");
    const personaAddBtn = document.getElementById("persona-add");

    let genreOverride = "drama";
    let shotOverride = "";
    let angleOverride = "eye_level";
    let timeOverride = "day";
    let weatherOverride = "clear";
    let historyCounter = 0;

    function setStatusRight(text, isError) {
      setStatus(statusRight, text, isError);
    }

    function setStatus(el, text, isError) {
      el.textContent = text;
      if (isError) el.classList.add("error");
      else el.classList.remove("error");
    }

    function applyCameraOverrides(scene) {
      scene.camera = scene.camera || {};
      scene.environment = scene.environment || {};
      if (genreOverride) {
        scene.genrePreset = genreOverride;
      }

      if (shotOverride) {
        scene.camera.shot = shotOverride;
      }
      if (angleOverride) {
        scene.camera.angle = angleOverride;
      }
      if (timeOverride) {
        scene.environment.timeOfDay = timeOverride;
      }
      if (weatherOverride) {
        scene.environment.weather = weatherOverride;
      }

      return scene;
    }

    // 디렉터 컨트롤 팝업용 옵션들
    const GENRE_OPTIONS = [
      { value: "action",      label: "Action",      img: "genre-action.png" },
      { value: "romance",     label: "Romance",     img: "genre-romance.png" },
      { value: "thriller",    label: "Thriller",    img: "genre-thriller.png" },
      { value: "documentary", label: "Documentary", img: "genre-documentary.png" },
      { value: "animation",   label: "Animation",   img: "genre-animation.png" },
      { value: "drama",       label: "Drama",       img: "genre-drama.png" }
    ];

    const SHOT_OPTIONS = [
      { value: "",                label: "Recommend",         img: "shot-recommend.png" },
      { value: "extreme_close_up", label: "Extreme Close-Up", img: "shot-extreme-close-up.png" },
      { value: "close_up",         label: "Close-Up",         img: "shot-close-up.png" },
      { value: "medium_close_up",  label: "Medium Close-Up",  img: "shot-medium-close-up.png" },
      { value: "medium",           label: "Medium Shot",      img: "shot-medium-shot.png" },
      { value: "medium_wide",      label: "Medium Wide Shot", img: "shot-medium-wide-shot.png" },
      { value: "wide",             label: "Wide Shot",        img: "shot-wide-shot.png" },
      { value: "extreme_wide",     label: "Extreme Wide Shot", img: "shot-extreme-wide-shot.png" }
    ];

    const ANGLE_OPTIONS = [
      { value: "eye_level",   label: "Eye Level",        img: "angle-eye-level.png" },
      { value: "low_angle",   label: "Low Angle",        img: "angle-low-angle.png" },
      { value: "high_angle",  label: "High Angle",       img: "angle-high-angle.png" },
      { value: "top_down",    label: "Bird's Eye View",  img: "angle-birds-eye-view.png" },
      { value: "worms_eye",   label: "Worm's Eye View",  img: "angle-worms-eye-view.png" },
      { value: "dutch_angle", label: "Dutch Angle",      img: "angle-dutch-angle.png" },
      { value: "over_shoulder", label: "Over the Shoulder", img: "angle-over-the-shoulder.png" },
      { value: "pov",         label: "Point of View",    img: "angle-point-of-view.png" }
    ];

    const TIME_OPTIONS = [
      { value: "dawn",  label: "새벽", img: "time-dawn.png" },
      { value: "day",   label: "낮",   img: "time-day.png" },
      { value: "dusk",  label: "노을", img: "time-dusk.png" },
      { value: "night", label: "밤",   img: "time-night.png" }
    ];

    const WEATHER_OPTIONS = [
      { value: "clear", label: "맑음", img: "weather-clear.png" },
      { value: "snowy", label: "눈",   img: "weather-snow.png" },
      { value: "rainy", label: "비",   img: "weather-rain.png" }
    ];

    function updatePreviewButton(btn, opt) {
      if (!btn || !opt) return;
      const img = btn.querySelector("img");
      const span = btn.querySelector("span");
      if (img) {
        img.src = opt.img;
        img.alt = opt.label + " thumbnail";
      }
      if (span) {
        span.textContent = opt.label;
      }
    }

    function openPicker(type, options, currentValue, onSelect) {
      if (!pickerOverlay || !pickerOptions || !pickerTitle) return;
      pickerOptions.innerHTML = "";
      pickerTitle.textContent =
        type === "genre" ? "장르 / 무드 선택" :
        type === "shot"  ? "화각 선택" :
        type === "angle" ? "앵글 선택" :
        type === "time"  ? "시간 선택" :
        type === "weather" ? "날씨 선택" : "선택";

      options.forEach((opt) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "shot-thumb";
        if (opt.value === currentValue) btn.classList.add("active");
        const img = document.createElement("img");
        img.src = opt.img;
        img.alt = opt.label + " thumbnail";
        const span = document.createElement("span");
        span.textContent = opt.label;
        btn.appendChild(img);
        btn.appendChild(span);
        btn.addEventListener("click", () => {
          onSelect(opt.value, opt);
          closePicker();
        });
        pickerOptions.appendChild(btn);
      });

      pickerOverlay.style.display = "block";

      // 말풍선 위치를 트리거 버튼 근처로 조정
      if (pickerPanel) {
        let anchorRect = null;
        let anchorEl = null;
        if (type === "genre") anchorEl = genrePreview;
        else if (type === "shot") anchorEl = shotPreview;
        else if (type === "angle") anchorEl = anglePreview;
        else if (type === "time") anchorEl = timePreview;
        else if (type === "weather") anchorEl = weatherPreview;

        if (anchorEl) {
          anchorRect = anchorEl.getBoundingClientRect();
          const top = Math.max(80, anchorRect.top + window.scrollY - 20);
          pickerPanel.style.top = top + "px";
        } else {
          pickerPanel.style.top = "120px";
        }
      }
    }

    function closePicker() {
      if (pickerOverlay) pickerOverlay.style.display = "none";
    }

    // 나노 바나나 등 특정 모델용 프롬프트 후처리
    function postProcessPromptForModel(prompt, options) {
      const { model, genre, cameraAngle } = options || {};
      let out = prompt;

      const isRomanceGenre = ["romance", "drama"].includes(genre);

      // 1) 로맨스/청춘 장르: 거친 단어 제거 후 부드러운 톤 보강
      if (model === "nanobanana" && isRomanceGenre) {
        out = out.replace(/\b(harsh|aggressive|grim|violent|menacing)\b/gi, "");
        if (!/dreamy/gi.test(out)) {
          out += "\nDreamy, soft, gentle romantic atmosphere.";
        }
      }

      // 2) 로우 앵글일 때 카메라 위치/각도 문구를 강하게 유지
      if (model === "nanobanana" && cameraAngle === "low_angle") {
        if (!/very low near the ground/gi.test(out)) {
          out = out.replace(
            /The camera is positioned[^.]*\./i,
            "The camera is positioned very low near the ground, looking up at a dramatic angle toward the characters."
          );
        }
      }

      return out;
    }

    if (pickerClose) pickerClose.addEventListener("click", closePicker);
    if (pickerOverlay) pickerOverlay.addEventListener("click", (e) => {
      if (e.target === pickerOverlay) closePicker();
    });

    function findOption(options, value, fallbackIdx) {
      let opt = options.find((o) => o.value === value);
      if (!opt) opt = options[fallbackIdx ?? 0];
      return opt;
    }

    // 초기 프리뷰 세팅
    updatePreviewButton(genrePreview,   findOption(GENRE_OPTIONS, genreOverride, 5));
    updatePreviewButton(shotPreview,    findOption(SHOT_OPTIONS, shotOverride, 3));
    updatePreviewButton(anglePreview,   findOption(ANGLE_OPTIONS, angleOverride, 0));
    updatePreviewButton(timePreview,    findOption(TIME_OPTIONS, timeOverride, 1));
    updatePreviewButton(weatherPreview, findOption(WEATHER_OPTIONS, weatherOverride, 0));

    if (genrePreview) {
      genrePreview.addEventListener("click", () => {
        openPicker("genre", GENRE_OPTIONS, genreOverride, (val, opt) => {
          genreOverride = val;
          updatePreviewButton(genrePreview, opt);
        });
      });
    }
    if (shotPreview) {
      shotPreview.addEventListener("click", () => {
        openPicker("shot", SHOT_OPTIONS, shotOverride, (val, opt) => {
          shotOverride = val;
          updatePreviewButton(shotPreview, opt);
        });
      });
    }
    if (anglePreview) {
      anglePreview.addEventListener("click", () => {
        openPicker("angle", ANGLE_OPTIONS, angleOverride, (val, opt) => {
          angleOverride = val;
          updatePreviewButton(anglePreview, opt);
        });
      });
    }
    if (timePreview) {
      timePreview.addEventListener("click", () => {
        openPicker("time", TIME_OPTIONS, timeOverride, (val, opt) => {
          timeOverride = val;
          updatePreviewButton(timePreview, opt);
        });
      });
    }
    if (weatherPreview) {
      weatherPreview.addEventListener("click", () => {
        openPicker("weather", WEATHER_OPTIONS, weatherOverride, (val, opt) => {
          weatherOverride = val;
          updatePreviewButton(weatherPreview, opt);
        });
      });
    }

    function buildHistoryTitle(koreanText, fallbackId) {
      const baseLine = (koreanText || "").split(/\r?\n/)[0].trim();
      if (!baseLine) return "프롬프트 " + fallbackId;
      const parts = baseLine.split(/\s+/).map((w) => {
        return w.replace(/(에서|으로|으로부터|에게|보고|을|를|은|는|이|가|와|과|도|만|에)$/u, "");
      }).filter(Boolean);
      if (parts.length >= 2) {
        return (parts[0] + parts[parts.length - 1]).slice(0, 16);
      }
      return baseLine.length > 16 ? baseLine.slice(0, 16) + "…" : baseLine;
    }

    function addHistoryItem(text, sourceKo) {
      if (!historyList || !text.trim()) return;
      const id = ++historyCounter;
      const item = document.createElement("div");
      item.className = "history-item";
      item.setAttribute("data-id", String(id));

      const preview = document.createElement("div");
      preview.className = "history-text";
      preview.textContent = text;

      const meta = document.createElement("div");
      meta.className = "history-meta";
      const label = document.createElement("span");
      label.className = "history-title";
      label.textContent = buildHistoryTitle(sourceKo, id);
      const actions = document.createElement("div");
      actions.className = "history-actions";

      const likeBtn = document.createElement("button");
      likeBtn.type = "button";
      likeBtn.className = "history-btn history-like";
      likeBtn.textContent = "☆";

      const copyBtn = document.createElement("button");
      copyBtn.type = "button";
      copyBtn.className = "history-btn history-copy";
      copyBtn.textContent = "복사";

      const deleteBtn = document.createElement("button");
      deleteBtn.type = "button";
      deleteBtn.className = "history-btn history-delete";
      deleteBtn.textContent = "삭제";

      actions.appendChild(likeBtn);
      actions.appendChild(copyBtn);
      actions.appendChild(deleteBtn);
      meta.appendChild(label);
      meta.appendChild(actions);

      item.appendChild(preview);
      item.appendChild(meta);

      historyList.insertBefore(item, historyList.firstChild);
    }

    function getPersonas() {
      if (!personaRow) return [];
      const inputs = Array.from(personaRow.querySelectorAll(".persona-input"));
      return inputs
        .map((el) => (el.value || "").trim())
        .filter((v) => v.length > 0);
    }

    if (personaAddBtn && personaRow) {
      personaRow.addEventListener("click", (e) => {
        const removeBtn = e.target && e.target.classList && e.target.classList.contains("persona-remove");
        if (removeBtn) {
          e.preventDefault();
          const item = e.target.closest(".persona-item");
          if (item && personaRow.querySelectorAll(".persona-item").length > 1) {
            item.remove();
          }
        }
      });
      personaAddBtn.addEventListener("click", (e) => {
        e.preventDefault();
        const count = personaRow.querySelectorAll(".persona-input").length;
        const label = String.fromCharCode(65 + count);
        const item = document.createElement("div");
        item.className = "persona-item";
        const input = document.createElement("input");
        input.className = "persona-input";
        input.type = "text";
        input.placeholder = "인물 " + label;
        input.style.padding = "4px 8px";
        input.style.border = "none";
        input.style.background = "transparent";
        input.style.color = "#e5e7eb";
        input.style.fontSize = "12px";
        input.style.minWidth = "72px";
        const removeBtn = document.createElement("button");
        removeBtn.className = "persona-remove";
        removeBtn.type = "button";
        removeBtn.title = "삭제";
        removeBtn.textContent = "×";
        item.appendChild(input);
        item.appendChild(removeBtn);
        personaRow.insertBefore(item, personaAddBtn);
        input.focus();
      });
    }

    generateBtn.addEventListener("click", async () => {
      const text = koInput.value.trim();
      if (!text) {
        setStatusRight("한국어 장면 설명을 먼저 입력하세요.", true);
        return;
      }

      promptOutput.textContent = "";
      setStatusRight("Groq로 SceneSchema 생성 중...", false);

      try {
        let scene = await koreanToSceneSchemaGroq(text);
        const personas = getPersonas();
        if (personas.length) {
          scene.personas = personas;
        }
        scene = applyCameraOverrides(scene);
        const prompt = buildPromptFromScene(scene);

        const model = modelSelect ? (modelSelect.value || "generic") : "generic";
        const finalPrompt =
          model === "nanobanana"
            ? postProcessPromptForModel(prompt, {
                model,
                genre: scene.genrePreset || "auto",
                cameraAngle: scene.camera && scene.camera.angle
              })
            : prompt;

        promptOutput.textContent = finalPrompt;
        addHistoryItem(finalPrompt, koInput.value);
        setStatusRight("SceneSchema · 프롬프트 생성 완료.", false);
      } catch (e) {
        setStatusRight("SceneSchema 생성 실패: " + e.message, true);
      }
    });

    if (historyList) {
      historyList.addEventListener("click", async (e) => {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        const item = target.closest(".history-item");
        if (!item) return;

        if (target.classList.contains("history-delete")) {
          e.preventDefault();
          item.remove();
          return;
        }
        if (target.classList.contains("history-like")) {
          e.preventDefault();
          target.classList.toggle("history-liked");
          target.textContent = target.classList.contains("history-liked") ? "★" : "☆";
          return;
        }
        if (target.classList.contains("history-copy")) {
          e.preventDefault();
          const textEl = item.querySelector(".history-text");
          const full = textEl ? textEl.textContent || "" : "";
          if (!full.trim()) return;
          try {
            await navigator.clipboard.writeText(full);
            setStatus(statusRight, "히스토리 프롬프트를 클립보드에 복사했습니다.", false);
          } catch {
            setStatus(statusRight, "클립보드 복사 실패.", true);
          }
          return;
        }
        if (target.classList.contains("history-title") || target.closest(".history-meta")) {
          e.preventDefault();
          item.classList.toggle("open");
          return;
        }
      });
    }

    copyBtn.addEventListener("click", async () => {
      const text = promptOutput.textContent || "";
      if (!text.trim()) return;
      try {
        await navigator.clipboard.writeText(text);
        setStatus(statusRight, "프롬프트를 클립보드에 복사했습니다.", false);
      } catch {
        setStatus(statusRight, "클립보드 복사 실패.", true);
      }
    });
  </script>
