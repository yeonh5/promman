<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>promman – Groq prototype</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020617;
      color: #e5e7eb;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 20px 16px 12px;
      background: #020617;
      border-bottom: 1px solid #1f2937;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .logo-mark {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 20px;
      color: #3b82f6;
      background: radial-gradient(circle at 30% 0%, #1d4ed8, #020617);
      box-shadow: 0 0 0 1px rgba(15,23,42,0.9), 0 18px 40px rgba(15,23,42,0.9);
    }
    header h1 {
      font-size: 18px;
      margin: 0;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    header h1 span { color: #3b82f6; }
    header span.sub {
      font-size: 12px;
      color: #9ca3af;
      text-align: center;
    }
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      min-height: 0;
    }
    .column {
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-left: 1px solid #1f2937;
    }
    .column:first-child { border-left: none; }

    .section-header {
      padding: 8px 12px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ca3af;
      border-bottom: 1px solid #1f2937;
      background: #020617;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .section-header span.sub2 {
      font-size: 11px;
      text-transform: none;
      letter-spacing: 0;
      color: #6b7280;
    }

    textarea {
      border: none;
      resize: none;
      padding: 12px;
      background: #020617;
      color: #e5e7eb;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
      line-height: 1.5;
      outline: none;
      border-radius: 0;
      width: 100%;
      box-sizing: border-box;
    }

    .ko-input-wrapper {
      padding: 10px 12px;
      border-bottom: 1px solid #1f2937;
    }
    .ko-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .ko-row textarea {
      flex: 1;
      min-height: 80px;
      max-height: 150px;
    }

    .btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 999px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
    }
    .btn:hover { background: #2563eb; }
    .btn.secondary {
      background: #111827;
      color: #e5e7eb;
      border: 1px solid #374151;
    }
    .btn.secondary:hover { background: #1f2937; }

    .status {
      font-size: 11px;
      color: #9ca3af;
      padding: 4px 12px 0;
    }
    .status.error { color: #f97373; }

    .output {
      flex: 1;
      padding: 12px;
      background: #020617;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      overflow: auto;
    }

    .footer {
      padding: 8px 12px;
      border-top: 1px solid #1f2937;
      background: #020617;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .right-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .select {
      background: #020617;
      color: #e5e7eb;
      border-radius: 999px;
      border: 1px solid #374151;
      padding: 5px 10px;
      font-size: 11px;
    }
    .badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 999px;
      background: #111827;
      border: 1px solid #374151;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-mark">P</div>
    <h1><span>prom</span>man</h1>
    <span class="sub">한국어 장면을 영화 스틸 프롬프트로 변환하는 작은 촬영감독 도우미</span>
  </header>

  <main>
    <!-- 왼쪽: 한국어 입력 + 결과 프롬프트 -->
    <section class="column">
      <div class="section-header">
        <span>Generated Cinematic Prompt</span>
        <span class="sub2">영화 스틸 느낌의 영어 프롬프트</span>
      </div>
      <div class="ko-input-wrapper">
        <div class="ko-row">
          <textarea id="ko-input" placeholder="여기에 장면을 한국어로 적어보세요.&#10;예) 한국 남녀가 풋풋하게 종로 호프에서 맥주를 마시고 있다"></textarea>
          <button class="btn" id="generate-btn">Groq로 번역</button>
        </div>
      </div>
      <div id="prompt-output" class="output"></div>
      <div class="footer">
        <span id="status-right" class="status">아직 생성되지 않았습니다.</span>
        <div class="right-controls">
          <select id="model-select" class="select">
            <option value="generic">Generic</option>
            <option value="nanobanana">Nanobanana</option>
            <option value="kling">Kling</option>
          </select>
          <button class="btn secondary" id="copy-btn">프롬프트 복사</button>
        </div>
      </div>
    </section>

    <!-- 오른쪽: 촬영감독 컨트롤 패널 -->
    <section class="column">
      <div class="section-header">
        <span>Director Controls</span>
        <span class="sub2">카메라 · 시간 · 감독 톤</span>
      </div>
      <div style="padding: 10px 12px; display: flex; flex-direction: column; gap: 12px;">
        <!-- 카메라 화각 -->
        <div>
          <div class="status" style="padding-left:0;">카메라 화각 (Shot)</div>
          <select id="shot-select" class="select" style="width:100%; margin-top:4px;">
            <option value="">SceneSchema에 맡기기</option>
            <option value="extreme_close_up">익스트림 클로즈업</option>
            <option value="close_up">클로즈업</option>
            <option value="medium">미디엄 투샷</option>
            <option value="medium_wide">미디엄 와이드</option>
            <option value="wide">와이드샷</option>
            <option value="long">롱샷</option>
          </select>
        </div>

        <!-- 카메라 앵글 -->
        <div>
          <div class="status" style="padding-left:0;">카메라 앵글 (Angle)</div>
          <select id="angle-select" class="select" style="width:100%; margin-top:4px;">
            <option value="">SceneSchema에 맡기기</option>
            <option value="eye_level">아이 레벨</option>
            <option value="high_angle">하이 앵글</option>
            <option value="low_angle">로우 앵글</option>
            <option value="dutch_angle">더치 앵글</option>
            <option value="top_down">탑다운</option>
          </select>
        </div>

        <!-- 시간 / 밤낮 -->
        <div>
          <div class="status" style="padding-left:0;">시간과 분위기</div>
          <div style="display:flex; gap:8px; margin-top:4px; align-items:center;">
            <select id="time-select" class="select" style="flex:1;">
              <option value="">SceneSchema에 맡기기</option>
              <option value="day">낮</option>
              <option value="golden_hour">골든아워</option>
              <option value="dusk">해질녘</option>
              <option value="night">밤</option>
            </select>
            <input id="clock-range" type="range" min="0" max="23" value="20" style="flex:1;">
            <span id="clock-label" class="badge">20:00</span>
          </div>
        </div>

        <!-- 감독 프리셋 -->
        <div>
          <div class="status" style="padding-left:0;">감독 스타일 프리셋</div>
          <select id="director-select" class="select" style="width:100%; margin-top:4px;">
            <option value="none">선택 안 함 (SceneSchema 그대로)</option>
            <option value="park_chan_wook">박찬욱 · 다크하고 정교한 프레이밍</option>
            <option value="bong_joon_ho">봉준호 · 현실감+사회적 긴장</option>
            <option value="greta_gerwig">그레타 거윅 · 밝고 따뜻한 청춘</option>
            <option value="nolan">크리스토퍼 놀란 · 스케일 큰 서사와 극적 대비</option>
          </select>
        </div>
      </div>
    </section>
  </main>

  <script>
    // ===== 1) SceneSchema → 프롬프트 빌더 (규칙 기반) =====
    function buildPromptFromScene(scene) {
      const subjects = scene.subjects || [];
      const primary_action = scene.primary_action || {};
      const location = scene.location || {};
      const environment = scene.environment || {};
      const camera = scene.camera || {};
      const lighting = scene.lighting || {};
      const mood = scene.mood || {};
      const styleControl = scene.styleControl || {
        stylePreset: "unspecified",
        allow_stylization: false,
        required_keywords_en: [],
        forbidden_keywords_en: []
      };

      const subjectDescriptions = subjects
        .filter((s) => s.type === "human")
        .map((s) => s.description_en || "a person")
        .join(" and ") || "two people";

      const relationship = scene.relationship || "unspecified";
      const relationshipPhrase =
        relationship === "couple"
          ? "who seem like a couple"
          : relationship === "friends"
          ? "who seem like close friends"
          : relationship === "family"
          ? "who seem like family"
          : "";

      const actionLineParts = [
        primary_action.main_verb_en,
        primary_action.detail_en,
        primary_action.emotional_change_en ? "their mood shifts " + primary_action.emotional_change_en : ""
      ].filter(Boolean);
      const actionLine = actionLineParts.join(", ");

      const locationText =
        location.detail_en ||
        location.name_en ||
        "an urban outdoor location";

      let timeOfDayText = "";
      switch (environment.timeOfDay) {
        case "night": timeOfDayText = "at night"; break;
        case "golden_hour": timeOfDayText = "during golden hour"; break;
        case "day": timeOfDayText = "during the day"; break;
        case "dawn": timeOfDayText = "at dawn"; break;
        case "dusk": timeOfDayText = "at dusk"; break;
        default: timeOfDayText = "";
      }

      const atmosphereText = environment.atmosphere_en || "";
      let colorGradingText = "naturalistic color grading";
      switch (environment.colorGrading) {
        case "warm":
          colorGradingText = "warm color grading with natural skin tones"; break;
        case "teal_orange":
          colorGradingText = "subtle teal and orange color grading"; break;
        case "monochrome":
          colorGradingText = "soft monochrome grading"; break;
        case "vibrant":
          colorGradingText = "vibrant but cinematic color grading"; break;
        case "muted":
          colorGradingText = "muted, understated color grading"; break;
      }

      const shotTextMap = {
        extreme_close_up: "an extreme close-up shot",
        close_up: "a close-up shot",
        medium: "a medium two-shot",
        medium_wide: "a medium wide shot",
        wide: "a wide shot",
        long: "a long shot"
      };
      const movementTextMap = {
        static: "from a static camera",
        pan: "with a gentle pan",
        tilt: "with a slow tilt",
        dolly_in: "with a slow dolly in toward them",
        dolly_out: "with a slow dolly out",
        truck: "with a subtle sideways truck move",
        arc: "with a slow arcing movement around them",
        crane: "with a slow crane movement",
        handheld: "with a slightly handheld, natural feel",
        unspecified: ""
      };

      const shotText = shotTextMap[camera.shot] || "a medium shot";
      const movementText = movementTextMap[camera.movement || "unspecified"] || "";
      const depthText = camera.depthOfField_en || "natural depth of field";

      let lightingDescription = lighting.description_en;
      if (!lightingDescription) {
        switch (lighting.style) {
          case "natural":
            lightingDescription = "natural, soft lighting"; break;
          case "low_key":
            lightingDescription = "low key lighting with strong contrast and deep shadows"; break;
          case "high_key":
            lightingDescription = "bright, high key lighting with soft shadows"; break;
          case "golden_hour":
            lightingDescription = "warm golden hour light"; break;
          case "volumetric":
            lightingDescription = "dramatic volumetric lighting with visible light beams"; break;
          default:
            lightingDescription = "cinematic lighting";
        }
      }

      const requiredKeywords = (styleControl.required_keywords_en || []).join(", ");
      const forbiddenKeywords = (styleControl.forbidden_keywords_en || []).join(", ");

      let stylePresetText;
      switch (styleControl.stylePreset) {
        case "korean_urban_romance_film":
          stylePresetText = "A cinematic still frame from a modern Korean urban romance film, shot on 35mm."; break;
        case "korean_indie_drama":
          stylePresetText = "A quiet, cinematic still from a Korean indie drama."; break;
        case "hollywood_blockbuster":
          stylePresetText = "A cinematic still from a Hollywood film."; break;
        case "documentary":
          stylePresetText = "A realistic still from a documentary film."; break;
        default:
          stylePresetText = "A cinematic film still.";
      }

      const moodText = mood && mood.tone_en ? mood.tone_en : "";

      const lines = [];
      lines.push(stylePresetText);
      lines.push("");
      lines.push(
        shotText +
          " of " +
          subjectDescriptions +
          (relationshipPhrase ? ", " + relationshipPhrase : "") +
          ", at " +
          locationText +
          (timeOfDayText ? " " + timeOfDayText : "") +
          "."
      );
      if (actionLine) lines.push(actionLine + ".");
      lines.push(
        lightingDescription +
          ", " +
          depthText +
          (atmosphereText ? ", " + atmosphereText : "") +
          ", " +
          colorGradingText +
          "."
      );
      if (moodText) lines.push(moodText + ".");
      if (requiredKeywords) lines.push(requiredKeywords + ".");
      if (forbiddenKeywords) lines.push(forbiddenKeywords + ".");
      return lines.join("\n");
    }

    // ===== 2) Groq: 한국어 → SceneSchema JSON (백엔드 /api/scene 경유) =====
    async function koreanToSceneSchemaGroq(koreanText) {
      const res = await fetch("/api/scene", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ koreanText })
      });

      if (!res.ok) {
        const txt = await res.text();
        throw new Error("Backend error: " + txt);
      }

      const scene = await res.json();
      return scene;
    }

    // ===== 3) UI 연결 =====
    const koInput = document.getElementById("ko-input");
    const generateBtn = document.getElementById("generate-btn");
    const promptOutput = document.getElementById("prompt-output");
    const statusRight = document.getElementById("status-right");
    const copyBtn = document.getElementById("copy-btn");
    const shotSelect = document.getElementById("shot-select");
    const angleSelect = document.getElementById("angle-select");
    const timeSelect = document.getElementById("time-select");
    const clockRange = document.getElementById("clock-range");
    const clockLabel = document.getElementById("clock-label");
    const directorSelect = document.getElementById("director-select");

    function setStatusRight(text, isError) {
      setStatus(statusRight, text, isError);
    }

    function setStatus(el, text, isError) {
      el.textContent = text;
      if (isError) el.classList.add("error");
      else el.classList.remove("error");
    }

    function applyDirectorOverrides(scene) {
      const override = directorSelect.value;
      if (!override || override === "none") return scene;

      scene.styleControl = scene.styleControl || {
        stylePreset: "unspecified",
        allow_stylization: true,
        required_keywords_en: [],
        forbidden_keywords_en: []
      };
      scene.mood = scene.mood || {};

      switch (override) {
        case "park_chan_wook":
          scene.styleControl.stylePreset = "korean_indie_drama";
          scene.mood.tone_en = "dark, tense, meticulously composed like a Park Chan-wook film";
          scene.styleControl.required_keywords_en.push("highly composed framing", "Korean auteur cinema");
          break;
        case "bong_joon_ho":
          scene.styleControl.stylePreset = "korean_urban_romance_film";
          scene.mood.tone_en = "realistic, slightly satirical, with social tension like a Bong Joon-ho film";
          scene.styleControl.required_keywords_en.push("Korean realist cinema", "subtle social commentary");
          break;
        case "greta_gerwig":
          scene.styleControl.stylePreset = "korean_urban_romance_film";
          scene.mood.tone_en = "warm, tender, youth-driven energy like a Greta Gerwig film";
          scene.styleControl.required_keywords_en.push("soft pastel colors", "gentle whimsical tone");
          break;
        case "nolan":
          scene.styleControl.stylePreset = "hollywood_blockbuster";
          scene.mood.tone_en = "epic, serious, high-stakes atmosphere like a Christopher Nolan film";
          scene.styleControl.required_keywords_en.push("strong contrast lighting", "precise, dramatic framing");
          break;
      }

      return scene;
    }

    function applyCameraOverrides(scene) {
      scene.camera = scene.camera || {};
      scene.environment = scene.environment || {};

      if (shotSelect.value) {
        scene.camera.shot = shotSelect.value;
      }
      if (angleSelect.value) {
        scene.camera.angle = angleSelect.value;
      }
      if (timeSelect.value) {
        scene.environment.timeOfDay = timeSelect.value;
      }

      return scene;
    }

    clockRange.addEventListener("input", () => {
      const h = parseInt(clockRange.value, 10) || 0;
      const label = `${String(h).padStart(2, "0")}:00`;
      clockLabel.textContent = label;
    });

    generateBtn.addEventListener("click", async () => {
      const text = koInput.value.trim();
      if (!text) {
        setStatusRight("한국어 장면 설명을 먼저 입력하세요.", true);
        return;
      }

      promptOutput.textContent = "";
      setStatusRight("Groq로 SceneSchema 생성 중...", false);

      try {
        let scene = await koreanToSceneSchemaGroq(text);
        scene = applyCameraOverrides(scene);
        scene = applyDirectorOverrides(scene);
        const prompt = buildPromptFromScene(scene);
        promptOutput.textContent = prompt;
        setStatusRight("SceneSchema · 프롬프트 생성 완료.", false);
      } catch (e) {
        setStatusRight("SceneSchema 생성 실패: " + e.message, true);
      }
    });

    copyBtn.addEventListener("click", async () => {
      const text = promptOutput.textContent || "";
      if (!text.trim()) return;
      try {
        await navigator.clipboard.writeText(text);
        setStatus(statusRight, "프롬프트를 클립보드에 복사했습니다.", false);
      } catch {
        setStatus(statusRight, "클립보드 복사 실패.", true);
      }
    });
  </script>
</body>
</html>
